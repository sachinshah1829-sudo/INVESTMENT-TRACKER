<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <title>Investment Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #fafaf9;
      --surface: #ffffff;
      --sidebar-bg: #0f172a;
      --sidebar-text: #f8fafc;
      --sidebar-muted: #94a3b8;
      --sidebar-active: #ffffff;
      --sidebar-active-bg: #1e293b;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --green: #15803d;
      --green-bg: #f0fdf4;
      --red: #b91c1c;
      --red-bg: #fef2f2;
      --amber: #b45309;
      --amber-bg: #fffbeb;
      --input-bg: #ffffff;
      --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --radius: 0px;
      /* Keeping it sharp for the monochrome look */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      overflow-x: hidden;
      width: 100%;
      position: relative;
    }

    body {
      font-family: 'Courier Prime', 'Courier New', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* AUTH */
    .auth-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      padding: 1rem;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
    }

    .auth-brand {
      font-size: 11px;
      letter-spacing: .15em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: .3rem;
    }

    .auth-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 2rem;
    }

    .auth-tabs {
      display: flex;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .auth-tab {
      padding: .5rem 1rem;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      transition: all .15s;
    }

    .auth-tab.active {
      color: var(--text);
      border-bottom-color: var(--text);
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-label {
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-muted);
      display: block;
      margin-bottom: .4rem;
    }

    .form-input {
      width: 100%;
      padding: .6rem .75rem;
      border: 1px solid var(--border);
      background: var(--input-bg);
      font-family: inherit;
      font-size: 16px;
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }

    .form-input:focus {
      border-color: var(--text);
    }

    .btn-primary {
      width: 100%;
      padding: .65rem;
      background: var(--text);
      color: #fff;
      border: none;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .05em;
      transition: opacity .15s;
    }

    .btn-primary:hover {
      opacity: .85;
    }

    .btn-primary:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    .btn-google {
      width: 100%;
      padding: .65rem;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      margin-top: .75rem;
      transition: background .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-google:hover {
      background: var(--bg);
    }

    .divider {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      margin: 1rem 0;
    }

    .auth-error {
      color: var(--red);
      font-size: 12px;
      margin-top: .5rem;
    }

    /* LAYOUT */
    .app {
      display: flex;
      min-height: 100vh;
      width: 100%;
      overflow-x: hidden;
    }

    .sidebar {
      width: 220px;
      min-width: 220px;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      z-index: 100;
      transition: transform .3s ease;
    }

    .sidebar-brand {
      padding: 1.5rem 1.25rem .75rem;
    }

    .sidebar-brand-sub {
      font-size: 10px;
      letter-spacing: .15em;
      color: var(--sidebar-muted);
      text-transform: uppercase;
    }

    .sidebar-brand-name {
      font-size: 20px;
      font-weight: 700;
      color: var(--sidebar-active);
    }

    .sidebar-nav {
      flex: 1;
      padding: .5rem 0;
      overflow-y: auto;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: .65rem 1.25rem;
      cursor: pointer;
      color: var(--sidebar-muted);
      font-size: 13px;
      transition: all .15s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }

    .sidebar-item:hover {
      color: var(--sidebar-text);
      background: rgba(255, 255, 255, .05);
    }

    .sidebar-item.active {
      color: var(--sidebar-active);
      background: var(--sidebar-active-bg);
    }

    .sidebar-icon {
      font-size: 14px;
      width: 18px;
      text-align: center;
    }

    .sidebar-footer {
      padding: 1rem 1.25rem;
      border-top: 1px solid rgba(255, 255, 255, .08);
    }

    .sidebar-user {
      font-size: 11px;
      color: var(--sidebar-muted);
      margin-bottom: .5rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-logout {
      width: 100%;
      padding: .4rem .75rem;
      background: none;
      border: 1px solid rgba(255, 255, 255, .15);
      color: var(--sidebar-muted);
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      letter-spacing: .08em;
      transition: all .15s;
    }

    .btn-logout:hover {
      border-color: rgba(255, 255, 255, .4);
      color: var(--sidebar-text);
    }

    .main {
      margin-left: 220px;
      flex: 1;
      min-height: 100vh;
      width: calc(100% - 220px);
      overflow-x: hidden;
    }

    .page {
      padding: 2rem;
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    .page-header {
      margin-bottom: 1.5rem;
    }

    .page-title {
      font-size: 22px;
      font-weight: 700;
    }

    .page-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: .2rem;
    }

    /* CARDS */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .card-title {
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: .75rem;
    }

    /* STATS */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--surface);
      padding: 1.5rem;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .stat-card:hover {
      box-shadow: var(--shadow-md);
    }

    .stat-label {
      font-size: 11px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: .5rem;
      font-weight: 700;
    }

    .stat-val {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .pos {
      color: var(--green);
    }

    .neg {
      color: var(--red);
    }

    /* TABLE */
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      position: relative;
      background: var(--surface);
    }

    /* Horizontal Scroll Indicator Fade */
    .table-wrap::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 30px;
      background: linear-gradient(90deg, transparent, rgba(0, 0, 0, 0.03));
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .table-wrap:has(table:not([style*="width: 100%"]))::after {
      opacity: 1;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 14px;
    }

    th {
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-align: left;
      padding: 1rem .75rem;
      border-bottom: 2px solid var(--border);
      font-weight: 700;
      white-space: nowrap;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    td {
      padding: 1rem .75rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }

    /* Sticky First Column on Mobile - REMOVED AS PER USER REQUEST */
    @media(max-width: 768px) {
      /* th:first-child, td:first-child removed */
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr.clickable:hover td {
      background: #f8fafc;
      cursor: pointer;
    }

    /* TAGS */
    .tag {
      display: inline-block;
      padding: 1px 8px;
      font-size: 11px;
      border-radius: 2px;
      font-weight: 700;
    }

    .badge-green {
      background: var(--green-bg);
      color: var(--green);
    }

    .badge-red {
      background: var(--red-bg);
      color: var(--red);
    }

    /* FORMS */
    .form-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: .75rem;
      margin-bottom: .75rem;
    }

    .select-input {
      width: 100%;
      padding: .55rem .75rem;
      border: 1px solid var(--border);
      background: var(--input-bg);
      font-family: inherit;
      font-size: 16px;
      color: var(--text);
      outline: none;
      appearance: none;
      cursor: pointer;
    }

    .select-input:focus {
      border-color: var(--text);
    }

    .textarea-input {
      width: 100%;
      padding: .6rem .75rem;
      min-height: 120px;
      resize: vertical;
      border: 1px solid var(--border);
      background: var(--input-bg);
      font-family: inherit;
      font-size: 12px;
      color: var(--text);
      outline: none;
    }

    .textarea-input:focus {
      border-color: var(--text);
    }

    .btn-secondary {
      padding: .55rem 1.25rem;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: background .15s;
    }

    .btn-secondary:hover {
      background: var(--bg);
    }

    .btn-sm {
      padding: .3rem .6rem;
      background: none;
      color: var(--text-muted);
      border: 1px solid var(--border);
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      transition: all .15s;
    }

    .btn-sm:hover {
      background: var(--bg);
      color: var(--text);
    }

    .btn-sm-danger {
      padding: .3rem .6rem;
      background: none;
      color: var(--red);
      border: 1px solid var(--red-bg);
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      transition: all .15s;
    }

    .btn-sm-danger:hover {
      background: var(--red-bg);
    }

    .btn-danger {
      padding: .55rem 1.25rem;
      background: var(--red);
      color: #fff;
      border: none;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: opacity .15s;
    }

    .btn-danger:hover {
      opacity: .85;
    }

    .btn-danger:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    /* MODAL */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .45);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.75rem;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: var(--text-muted);
      line-height: 1;
    }

    .modal-actions {
      display: flex;
      gap: .5rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    /* SAVE FEEDBACK */
    .save-feedback {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      font-size: 13px;
      color: var(--green);
      font-weight: 700;
    }

    /* FILTER BAR */
    .filter-bar {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
      align-items: center;
    }

    .filter-bar select {
      padding: .35rem .6rem;
      border: 1px solid var(--border);
      background: var(--surface);
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      outline: none;
    }

    /* BULK ACTIONS */
    .bulk-bar {
      display: flex;
      gap: .5rem;
      align-items: center;
      padding: .5rem .75rem;
      background: var(--amber-bg);
      border: 1px solid #ffe082;
      margin-bottom: .75rem;
      flex-wrap: wrap;
    }

    .bulk-bar-text {
      font-size: 12px;
      color: var(--amber);
      font-weight: 700;
    }

    /* CHARTS */
    .charts-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.25rem;
    }

    .chart-wrap {
      position: relative;
      height: 280px;
    }

    /* PREVIEW */
    .preview-table td {
      font-size: 12px;
    }

    .preview-ok {
      background: var(--green-bg);
    }

    .preview-err {
      background: var(--red-bg);
    }

    /* MISC */
    .cards-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .top-gainer-card {
      background: var(--green-bg);
      border: 1px solid #c8e6c9;
      padding: 1rem;
      flex: 1;
      min-width: 200px;
    }

    .top-loser-card {
      background: var(--red-bg);
      border: 1px solid #f7c1c1;
      padding: 1rem;
      flex: 1;
      min-width: 200px;
    }

    .empty {
      color: var(--text-muted);
      font-size: 13px;
      padding: 2rem;
      text-align: center;
    }

    .spinner {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
      font-size: 13px;
    }

    .section-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.25rem 0;
    }

    .import-progress {
      background: var(--green-bg);
      border: 1px solid #c8e6c9;
      padding: .75rem 1rem;
      margin-top: .75rem;
      font-size: 12px;
      color: var(--green);
    }

    .price-edit-input {
      width: 120px;
      padding: .25rem .5rem;
      border: 1px solid var(--border);
      background: var(--input-bg);
      font-family: inherit;
      font-size: 13px;
      color: var(--text);
      outline: none;
    }

    .price-edit-input:focus {
      border-color: var(--text);
    }

    .dup-error {
      color: var(--red);
      font-size: 12px;
      margin-top: .3rem;
    }

    /* CHECKBOX */
    input[type="checkbox"] {
      width: 15px;
      height: 15px;
      cursor: pointer;
      accent-color: var(--text);
    }

    /* COLOR PICKER */
    .color-swatch {
      width: 22px;
      height: 22px;
      border: 2px solid rgba(0, 0, 0, .18);
      cursor: pointer;
      border-radius: 3px;
      display: inline-block;
      flex-shrink: 0;
      transition: transform .1s;
    }

    .color-swatch:hover {
      transform: scale(1.15);
    }

    .color-popup {
      position: absolute;
      z-index: 300;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 10px;
      top: 28px;
      left: 0;
      width: 176px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, .14);
    }

    .color-preset-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
      margin-bottom: 8px;
    }

    .color-preset {
      width: 100%;
      aspect-ratio: 1;
      cursor: pointer;
      border-radius: 2px;
      border: 1px solid rgba(0, 0, 0, .1);
      transition: transform .1s;
    }

    .color-preset:hover {
      transform: scale(1.15);
    }

    .color-preset.selected {
      border: 2px solid var(--text);
    }

    /* MULTI SELECT */
    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .filter-label {
      font-size: 10px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 700;
    }

    .multi-select-wrap {
      position: relative;
      min-width: 160px;
    }

    .multi-select-trigger {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: .45rem .75rem;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: border-color .15s;
    }

    .multi-select-trigger:hover {
      border-color: var(--text-muted);
    }

    .multi-select-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      z-index: 400;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      margin-top: 4px;
      min-width: 200px;
      max-height: 280px;
      overflow-y: auto;
      padding: 4px;
    }

    .multi-select-opt {
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .multi-select-opt:hover {
      background: var(--bg);
    }

    .multi-select-opt input {
      cursor: pointer;
    }

    .multi-select-search {
      width: 100%;
      padding: 6px 10px;
      border: none;
      border-bottom: 1px solid var(--border);
      font-family: inherit;
      font-size: 12px;
      outline: none;
      margin-bottom: 4px;
    }

    /* MOBILE TOGGLE */
    .menu-toggle {
      display: none;
      position: fixed;
      top: .75rem;
      left: .75rem;
      z-index: 200;
      background: var(--sidebar-bg);
      color: #fff;
      border: none;
      width: 36px;
      height: 36px;
      font-size: 18px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
    }

    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      z-index: 90;
    }

    @media(max-width: 768px) {
      .sidebar {
        transform: translateX(-100%);
        box-shadow: 10px 0 30px rgba(0, 0, 0, 0.2);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar-overlay.open {
        display: block;
        backdrop-filter: blur(2px);
      }

      .menu-toggle {
        display: flex;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: var(--shadow-md);
      }

      .sidebar-brand {
        padding-left: 3.75rem;
      }

      .main {
        margin-left: 0;
        width: 100%;
        max-width: 100vw;
      }

      .page {
        padding: 0.75rem;
        padding-top: 4rem;
        width: 100%;
        box-sizing: border-box;
      }

      .card {
        padding: 0.75rem;
        margin-left: -0.75rem;
        margin-right: -0.75rem;
        width: calc(100% + 1.5rem);
        border-left: none;
        border-right: none;
      }

      .stats-grid {
        grid-template-columns: 1fr;
        gap: 0.75rem;
        margin-left: 0;
        margin-right: 0;
        width: 100%;
      }

      .charts-row {

    // ── HELPERS ───────────────────────────────────────────────
    const todayISO = () => new Date().toISOString().split('T')[0];
    const fmt = n => n == null || isNaN(n) ? '—' : '₹' + Number(n).toLocaleString('en-IN', { maximumFractionDigits: 2 });
    const fmtPct = n => n == null || isNaN(n) ? '—' : (n >= 0 ? '+' : '') + Number(n).toFixed(2) + '%';

    const fmtWords = (n) => {
      if (n == null || isNaN(n)) return '—';
      const abs = Math.abs(n);
      const sign = n < 0 ? '-' : '';
      if (abs >= 1e7) return sign + '₹' + (abs / 1e7).toFixed(2) + ' Cr';
      if (abs >= 1e5) return sign + '₹' + (abs / 1e5).toFixed(2) + ' L';
      if (abs >= 1e3) return sign + '₹' + (abs / 1e3).toFixed(2) + ' K';
      return sign + '₹' + abs.toFixed(0);
    };

    const toJSDate = d => {
      if (!d) return new Date(NaN);
      if (d instanceof Date) return d;
      let s = String(d).trim();
      if (/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{4}$/.test(s)) {
        const parts = s.split(/[\/\-]/);
        return new Date(`${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`);
      }
      return new Date(s);
    };
    const fmtDate = d => { try { const dt = toJSDate(d); return isNaN(dt) ? '—' : dt.toLocaleDateString('en-IN'); } catch { return '—'; } };
    const isValidDate = d => { try { const dt = toJSDate(d); return d && !isNaN(dt); } catch { return false; } };

    const DEFAULT_PERSON_COLORS = {
      NILESH: '#c8e6c9', HITESH: '#bbdefb', REKHA: '#f8bbd9', RASHMI: '#ffe0b2', HEENA: '#e1bee7',
      PRATIK: '#b3e0f7', JITESH: '#fff9c4', NIDHI: '#d7ccc8', DHARA: '#f0f4c3',
      'NILESH HUF': '#a5d6a7', 'HITESH HUF': '#90caf9', 'DHANVANTRAI HUF': '#ce93d8'
    };

    const PRESET_COLORS = [
      '#c8e6c9', '#bbdefb', '#f8bbd9', '#ffe0b2', '#e1bee7',
      '#b3e0f7', '#fff9c4', '#d7ccc8', '#f0f4c3', '#a5d6a7',

      '#fce4ec', '#e8eaf6', '#e0f2f1', '#e6ee9c', '#80deea'
    ];

    const personColor = (name, customColors = {}) => {
      const u = (name || '').toUpperCase().trim();
      if (customColors && customColors[u]) return customColors[u];
      if (DEFAULT_PERSON_COLORS[u]) return DEFAULT_PERSON_COLORS[u];
      let h = 0; for (let i = 0; i < u.length; i++) h = u.charCodeAt(i) + ((h << 5) - h);
      return `hsl(${Math.abs(h) % 360},50%,80%)`;
    };

    // ── FIFO ENGINE ───────────────────────────────────────────
    function computeFIFO(transactions) {
      const valid = transactions.filter(t => isValidDate(t.date) && t.stock && t.person && t.qty && t.price);
      const sorted = [...valid].sort((a, b) => toJSDate(a.date) - toJSDate(b.date));
      const buys = {}; const sells = [];
      sorted.forEach(tx => {
        const key = `${tx.person}|${tx.stock}`;
        if (!buys[key]) buys[key] = [];
        if (tx.qty > 0) { buys[key].push({ date: tx.date, price: tx.price, qty: tx.qty }); }
        else if (tx.qty < 0) {
          let sq = Math.abs(tx.qty); const q = buys[key] || [];
          while (sq > 0 && q.length > 0) {
            const b = q[0]; const used = Math.min(b.qty, sq);
            const profit = (tx.price - b.price) * used;
            const yrs = (toJSDate(tx.date) - toJSDate(b.date)) / (1000 * 60 * 60 * 24 * 365);
            const cagr = yrs > 0 ? (Math.pow(tx.price / b.price, 1 / yrs) - 1) * 100 : null;
            sells.push({ person: tx.person, stock: tx.stock, buyDate: b.date, buyPrice: b.price, sellDate: tx.date, sellPrice: tx.price, qty: used, profit, cagr, yrs });
            b.qty -= used; sq -= used; if (b.qty === 0) q.shift();
          }
        }
      });
      const holdings = {};
      Object.entries(buys).forEach(([key, lots]) => {
        const [person, stock] = key.split('|');
        const rem = lots.filter(l => l.qty > 0);
        if (!rem.length) return;
        if (!holdings[stock]) holdings[stock] = {};
        holdings[stock][person] = rem;
      });
      return { sells, holdings };
    }

    function buildPortfolio(holdings, stockPrices) {
      const rows = [];
      Object.entries(holdings).forEach(([stock, persons]) => {
        Object.entries(persons).forEach(([person, lots]) => {
          const totalQty = lots.reduce((s, l) => s + l.qty, 0);
          const investedVal = lots.reduce((s, l) => s + l.qty * l.price, 0);
          const avgBuy = investedVal / totalQty;
          const cp = stockPrices[stock] || stockPrices[stock.replace('NSE:', '')] || null;
          const currentVal = cp ? totalQty * cp : null;
          const absGain = currentVal != null ? currentVal - investedVal : null;
          const absGainPct = absGain != null ? (absGain / investedVal) * 100 : null;

          let weightedAge = 0; const now = new Date();
          lots.forEach(l => {
            const age = Math.max(0.001, (now - toJSDate(l.date)) / (1000 * 60 * 60 * 24 * 365));
            weightedAge += (l.qty * l.price) * age;
          });
          const avgAge = investedVal > 0 ? weightedAge / investedVal : 0;
          const cagr = (currentVal != null && investedVal > 0 && avgAge > 0) ? (Math.pow(currentVal / investedVal, 1 / avgAge) - 1) * 100 : null;

          const aggregated = {};
          lots.forEach(l => { aggregated[l.price] = (aggregated[l.price] || 0) + l.qty; });
          const breakup = Object.entries(aggregated).map(([p, q]) => `${q}@${p}`).join(', ');

          rows.push({ person, stock, totalQty, avgBuy, investedVal, currentPrice: cp, currentVal, absGain, absGainPct, breakup, cagr, weightedAge });
        });
      });
      return rows;
    }

    function buildStockSheet(holdings, stockPrices) {
      const stocks = {};
      Object.entries(holdings).forEach(([stock, persons]) => {
        if (!stocks[stock]) stocks[stock] = { stock, totalQty: 0, investedVal: 0, persons: {} };
        Object.entries(persons).forEach(([person, lots]) => {
          const qty = lots.reduce((s, l) => s + l.qty, 0);
          const inv = lots.reduce((s, l) => s + l.qty * l.price, 0);
          stocks[stock].totalQty += qty; stocks[stock].investedVal += inv;
          if (!stocks[stock].persons[person]) stocks[stock].persons[person] = { qty: 0, lots: [] };
          stocks[stock].persons[person].qty += qty;
          stocks[stock].persons[person].lots.push(...lots);
        });
      });
      return Object.values(stocks).map(s => {
        const cp = stockPrices[s.stock] || stockPrices[s.stock.replace('NSE:', '')] || null;
        const currentVal = cp ? s.totalQty * cp : null;
        const absGain = currentVal != null ? currentVal - s.investedVal : null;
        const absGainPct = absGain != null ? (absGain / s.investedVal) * 100 : null;

        let weightedAgeSum = 0; const now = new Date();
        Object.values(s.persons).forEach(p => {
          p.lots.forEach(l => {
            const age = Math.max(0.001, (now - toJSDate(l.date)) / (1000 * 60 * 60 * 24 * 365));
            weightedAgeSum += (l.qty * l.price) * age;
          });
        });
        const stockAvgAge = s.investedVal > 0 ? weightedAgeSum / s.investedVal : 0;
        const cagr = (currentVal != null && s.investedVal > 0 && stockAvgAge > 0) ? (Math.pow(currentVal / s.investedVal, 1 / stockAvgAge) - 1) * 100 : null;

        return { ...s, avgBuy: s.investedVal / s.totalQty, currentPrice: cp, currentVal, absGain, absGainPct, cagr };
      });
    }

    function MultiSelect({ label, options, selected, onChange }) {
      const [open, setOpen] = useState(false);
      const [search, setSearch] = useState('');
      const ref = useRef(null);

      useEffect(() => {
        if (!open) return;
        const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
        document.addEventListener('mousedown', h); return () => document.removeEventListener('mousedown', h);
      }, [open]);

      const toggle = val => {
        let next = [];
        if (val === 'All') { next = ['All']; }
        else {
          next = selected.filter(x => x !== 'All');
          if (next.includes(val)) next = next.filter(x => x !== val);
          else next.push(val);
          if (next.length === 0) next = ['All'];
        }
        onChange(next);
      };

      const filtered = options.filter(o => o.toLowerCase().includes(search.toLowerCase()));
      const display = selected.includes('All') ? 'All' : (selected.length === 1 ? selected[0] : `${selected.length} selected`);

      return (

    // ── CHART COMPONENTS ──────────────────────────────────────
    function BarChart({ labels, datasets }) {

    function PieChart({ labels, data, colors, hideLegend, onClick }) {
      const ref = useRef(null); const chart = useRef(null);
      useEffect(() => {
        if (!ref.current) return;
        if (chart.current) chart.current.destroy();
        const isMobile = window.innerWidth < 480;
        chart.current = new Chart(ref.current, {
          type: 'doughnut',
          data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 1, borderColor: '#1a1a1a' }] },
          options: {
            responsive: true, maintainAspectRatio: false,
            cutout: '70%',
            onClick: (evt, elements) => {
              if (elements && elements.length > 0 && onClick) {
                const index = elements[0].index;
                onClick(labels[index]);
              }
            },
            plugins: {
              legend: {
                display: !hideLegend,
                position: 'bottom',
                labels: {
                  font: { family: 'Courier Prime', size: isMobile ? 9 : 10 },
                  boxWidth: 8, padding: 8, color: '#e0e0e0'
                }
              },
              tooltip: {
                padding: 8,
                caretSize: 4,
                bodyFont: { size: isMobile ? 10 : 11 },
                titleFont: { size: isMobile ? 11 : 12 },
                displayColors: false,
                callbacks: {
                  label: ctx => {
                    const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                    const val = ctx.parsed;
                    const pct = ((val / total) * 100).toFixed(1) + '%';
                    const amount = `₹${Number(val).toLocaleString('en-IN', { maximumFractionDigits: 0 })}`;
                    return [`${ctx.label}: ${pct}`, amount];
                  }
                }
              }
            },
            layout: { padding: { bottom: 0 } }
          }
        });
        return () => { if (chart.current) chart.current.destroy(); };
      }, [JSON.stringify(labels), JSON.stringify(data), hideLegend]);
      return <canvas ref={ref} />;
    }

    // ── EDIT TX MODAL ─────────────────────────────────────────
    function EditTxModal({ tx, persons, onSave, onDelete, onClose }) {
      const [form, setForm] = useState({ date: tx.date || todayISO(), person: tx.person || '', stock: tx.stock || '', qty: tx.qty || '', price: tx.price || '' });
      const [saveState, setSaveState] = useState('idle');
      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
      const handleSave = async () => {
        if (!form.date || !form.person || !form.stock || !form.qty || !form.price) return;
        setSaveState('saving');
        const qty = Number(form.qty);
        await onSave(tx.id, { date: form.date, person: form.person.toUpperCase(), stock: form.stock.toUpperCase(), qty, price: Number(form.price) });
        setSaveState('saved');
        setTimeout(() => onClose(), 400);
      };
      const handleDelete = async () => { if (!confirm('Delete this transaction?')) return; await onDelete(tx.id); onClose(); };
      return (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>

    // ── DASHBOARD ─────────────────────────────────────────────
    function DashboardTab({ transactions, stockPrices, personColors, onPersonClick }) {
      const [filterPersons, setFilterPersons] = useState(['All']);
      const [drilldownPerson, setDrilldownPerson] = useState(null);
      const { sells, holdings } = computeFIFO(transactions);
      const allPortfolio = buildPortfolio(holdings, stockPrices);

      const persons = [...new Set([...allPortfolio.map(r => r.person), ...sells.map(r => r.person)])].sort();
      const portfolio = allPortfolio.filter(r => filterPersons.includes('All') || filterPersons.includes(r.person));
      const filteredSells = sells.filter(r => filterPersons.includes('All') || filterPersons.includes(r.person));

      const totalInvested = portfolio.reduce((s, r) => s + r.investedVal, 0);
      const totalCurrent = portfolio.reduce((s, r) => s + (r.currentVal || r.investedVal), 0);
      const totalGain = totalCurrent - totalInvested;
      const gainPct = totalInvested > 0 ? (totalGain / totalInvested) * 100 : 0;

      const totalWeightedAgeSum = portfolio.reduce((s, r) => s + (r.weightedAge || 0), 0);
      const realizedCostSum = filteredSells.reduce((s, r) => s + (r.qty * r.buyPrice), 0);
      const realizedValueSum = filteredSells.reduce((s, r) => s + (r.qty * r.sellPrice), 0);
      const realizedWeightedAgeSum = filteredSells.reduce((s, r) => s + (r.qty * r.buyPrice * (r.yrs || 0)), 0);

      const totalCostCombined = totalInvested + realizedCostSum;
      const totalValueCombined = totalCurrent + realizedValueSum;
      const totalWeightedAgeCombined = totalWeightedAgeSum + realizedWeightedAgeSum;

      const portfolioAvgAge = totalInvested > 0 ? totalWeightedAgeSum / totalInvested : 0;
      const unrealizedCAGR = (totalInvested > 0 && portfolioAvgAge > 0) ? (Math.pow(totalCurrent / totalInvested, 1 / portfolioAvgAge) - 1) * 100 : 0;

      const portfolioAvgAgeCombined = totalCostCombined > 0 ? totalWeightedAgeCombined / totalCostCombined : 0;
      const combinedCAGR = (totalCostCombined > 0 && portfolioAvgAgeCombined > 0) ? (Math.pow(totalValueCombined / totalCostCombined, 1 / portfolioAvgAgeCombined) - 1) * 100 : 0;

      const [showAllocation, setShowAllocation] = useState(false);

      // We still build the stock sheet data based on filtered portfolio for charts
      const stockGroups = {};
      portfolio.forEach(r => {
        if (!stockGroups[r.stock]) stockGroups[r.stock] = { stock: r.stock, totalQty: 0, investedVal: 0, absGain: 0, currentVal: 0 };
        stockGroups[r.stock].totalQty += r.totalQty;
        stockGroups[r.stock].investedVal += r.investedVal;
        stockGroups[r.stock].currentVal += (r.currentVal || r.investedVal);
        stockGroups[r.stock].absGain += (r.absGain || 0);
      });
      const stockRows = Object.values(stockGroups);
      const topGainer = [...stockRows].sort((a, b) => b.absGain - a.absGain)[0];
      const topLoser = [...stockRows].sort((a, b) => a.absGain - b.absGain)[0];

      const byPerson = {};
      portfolio.forEach(r => {
        if (!byPerson[r.person]) byPerson[r.person] = { invested: 0, current: 0 };
        byPerson[r.person].invested += r.investedVal;
        byPerson[r.person].current += (r.currentVal || r.investedVal);
      });
      const sortedPersons = Object.entries(byPerson).sort((a, b) => b[1].current - a[1].current);

      const pLabels = sortedPersons.map(([p]) => p);
      const barDatasets = [
        { label: 'Current Value', data: pLabels.map(p => byPerson[p].current), backgroundColor: '#87BFDB', borderWidth: 0 },
        { label: 'Invested Value', data: pLabels.map(p => byPerson[p].invested), backgroundColor: '#2B5F7A', borderWidth: 0 }
      ];

      const byStock = {};
      portfolio.forEach(r => { if (!byStock[r.stock]) byStock[r.stock] = 0; byStock[r.stock] += (r.currentVal || r.investedVal); });
      const stockEntries = Object.entries(byStock).sort((a, b) => b[1] - a[1]);

      const top10 = stockEntries.slice(0, 10);
      const others = stockEntries.slice(10);
      const otherVal = others.reduce((s, [, v]) => s + v, 0);

      const pieEntries = [...top10];
      if (otherVal > 0) pieEntries.push(['Others', otherVal]);

      const PIE_COLORS = ['#4e79a7', '#f28e2b', '#e15759', '#76b7b2', '#59a14f', '#edc948', '#b07aa1', '#ff9da7', '#9c755f', '#bab0ac', '#54a0e8', '#f87171', '#34d399', '#a78bfa', '#fb923c'];
      const pieLabels = pieEntries.map(([s]) => s);
      const pieData = pieEntries.map(([, v]) => v);
      const pieColors = pieEntries.map(([s], i) => s === 'Others' ? '#ced4da' : PIE_COLORS[i % PIE_COLORS.length]);

      const top5List = stockEntries.slice(0, 5).map(([s, v]) => ({ name: s, pct: totalCurrent > 0 ? (v / totalCurrent * 100).toFixed(1) : 0 }));

      return (
        <div className="page">
          {showAllocation && <StockAllocationModal stockEntries={stockEntries} totalValue={totalCurrent} onClose={() => setShowAllocation(false)} />}
          {drilldownPerson && (
            <PersonPortfolioModal
              person={drilldownPerson}
              rows={allPortfolio.filter(r => r.person === drilldownPerson)}
              personColors={personColors}
              onClose={() => setDrilldownPerson(null)}
            />
          )}
          <div className="page-header" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: '1rem' }}>
            <div>
              <div className="page-title">Dashboard</div>
              <div className="page-sub">{new Date().toLocaleDateString('en-IN', { month: 'long', year: 'numeric' })}</div>
            </div>
            <div style={{ minWidth: 200 }}>
              <MultiSelect label="Filter Persons" options={persons} selected={filterPersons} onChange={setFilterPersons} />
            </div>
          </div>
          <div className="stats-grid">
            <div className="stat-card"><div className="stat-label">Invested Value</div><div className="stat-val">{fmt(totalInvested)}</div></div>
            <div className="stat-card"><div className="stat-label">Current Value</div><div className="stat-val">{fmt(totalCurrent)}</div></div>
            <div className="stat-card">
              <div className="stat-label">Unrealized Gain</div>
              <div className={`stat-val ${totalGain >= 0 ? 'pos' : 'neg'}`}>{fmt(totalGain)}</div>
              <div className={`stat-sub ${totalGain >= 0 ? 'pos' : 'neg'}`} style={{ fontSize: 13, fontWeight: 700 }}>{fmtPct(gainPct)}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Unrealized Net CAGR</div>
              <div className={`stat-val ${unrealizedCAGR >= 0 ? 'pos' : 'neg'}`}>{fmtPct(unrealizedCAGR)}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Combined Net CAGR</div>
              <div className={`stat-val ${combinedCAGR >= 0 ? 'pos' : 'neg'}`}>{fmtPct(combinedCAGR)}</div>
            </div>

          </div>

          <div className="cards-row">
            {topGainer && <div className="top-gainer-card"><div className="card-title">Top Gainer</div><div style={{ fontWeight: 700 }}>{topGainer.stock}</div><div className="pos" style={{ fontSize: 20 }}>{fmt(topGainer.absGain)}</div></div>}
            {topLoser && topLoser.stock !== (topGainer?.stock) && <div className="top-loser-card"><div className="card-title">Top Loser</div><div style={{ fontWeight: 700 }}>{topLoser.stock}</div><div className="neg" style={{ fontSize: 20 }}>{fmt(topLoser.absGain)}</div></div>}
          </div>

          <div className="charts-row">
            <div className="chart-card">
              <div className="card-title">Current vs Invested Value by Person</div>
              <div className="chart-wrap"><BarChart labels={pLabels} datasets={barDatasets} /></div>
            </div>
            <div className="chart-card">
              <div className="card-title clickable" onClick={() => setShowAllocation(true)} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', cursor: 'pointer' }}>
                <span>Portfolio by Stock</span>
                <span style={{ fontSize: 10, color: 'var(--text-muted)', fontWeight: 400 }}>View all ↗</span>
              </div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: '1rem', alignItems: 'center' }}>
                <div className="chart-wrap" style={{ flex: '1 1 200px', height: 220 }}><PieChart labels={pieLabels} data={pieData} colors={pieColors} hideLegend /></div>
                <div style={{ flex: '1 1 150px' }}>
                  <div style={{ fontSize: 11, fontWeight: 700, marginBottom: '.5rem', color: 'var(--text-muted)' }}>TOP 5 ALLOCATION</div>
                  {top5List.map((item, i) => (
                    <div key={i} style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, padding: '.3rem 0', borderBottom: '1px solid rgba(255,255,255,0.05)' }}>
                      <span style={{ fontWeight: 700, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{item.name}</span>
                      <span style={{ color: 'var(--amber)', fontWeight: 700, marginLeft: '.5rem' }}>{item.pct}%</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {filterPersons.includes('All') ? (
            <div className="card">
              <div className="card-title">Portfolio breakdown by Person</div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: '2rem', alignItems: 'center', justifyContent: 'center' }}>
                <div className="chart-wrap" style={{ flex: '1 1 300px', height: 300 }}>
                  <PieChart
                    labels={sortedPersons.map(([p]) => p)}
                    data={sortedPersons.map(([, v]) => v.current)}
                    colors={sortedPersons.map(([p]) => personColor(p, personColors))}
                    onClick={setDrilldownPerson}
                  />
                </div>
                <div style={{ flex: '1 1 200px' }}>
                  {sortedPersons.map(([p, v]) => {
                    const pct = totalCurrent > 0 ? (v.current / totalCurrent * 100).toFixed(1) : 0;
                    return (
                      <div key={p} className="clickable" onClick={() => setDrilldownPerson(p)} style={{ display: 'flex', justifyContent: 'space-between', padding: '.4rem 0', borderBottom: '1px solid var(--border)', cursor: 'pointer' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                          <div style={{ width: 10, height: 10, background: personColor(p, personColors) }}></div>
                          <span style={{ fontWeight: 700, fontSize: 13 }}>{p}</span>
                        </div>
                        <div style={{ textAlign: 'right' }}>
                          <div style={{ fontWeight: 700, fontSize: 13 }}>{fmtWords(v.current)}</div>
                          <div style={{ fontSize: 10, color: 'var(--text-muted)' }}>{pct}%</div>

                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          ) : (
            <div className="card" style={{ padding: 0 }}>
              <div className="card-title" style={{ padding: '1.25rem 1.25rem 0' }}>Portfolio Breakdown</div>
              <div className="table-wrap">
                <table>
                  <thead><tr><th>Person</th><th>Stock</th><th style={{ textAlign: 'right' }}>Qty</th><th style={{ textAlign: 'right' }}>Avg Buy</th><th style={{ textAlign: 'right' }}>Invested</th><th style={{ textAlign: 'right' }}>Curr Price</th><th style={{ textAlign: 'right' }}>Curr Value</th><th style={{ textAlign: 'right' }}>Gain ₹</th><th style={{ textAlign: 'right' }}>Gain %</th><th style={{ textAlign: 'right' }}>CAGR</th><th>Holdings</th></tr></thead>
                  <tbody>
                    {portfolio.length === 0 && <tr><td colSpan="11"><div className="empty">No data for selected filter</div></td></tr>}
                    {portfolio.sort((a, b) => b.currentVal - a.currentVal).map((r, i) => (

    // ── TRANSACTIONS ──────────────────────────────────────────
    function TransactionsTab({ transactions, persons, onAdd, onBulkAdd, onUpdate, onDelete, onEnsurePerson, personColors }) {
      const [form, setForm] = useState({ date: todayISO(), person: '', stock: '', qty: '', price: '' });
      const [csvMode, setCsvMode] = useState(false);
      const [csvText, setCsvText] = useState('');
      const [preview, setPreview] = useState(null);
      const [saving, setSaving] = useState(false);
      const [importProgress, setImportProgress] = useState(null);
      const [search, setSearch] = useState('');
      const [editTx, setEditTx] = useState(null);
      const [selected, setSelected] = useState(new Set());
      const [selectMode, setSelectMode] = useState(false);
      const [deleting, setDeleting] = useState(false);
      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const handleAdd = async () => {
        if (!form.date || !form.person || !form.stock || !form.qty || !form.price) return;
        setSaving(true);
        await onEnsurePerson(form.person.toUpperCase());
        const qty = Number(form.qty);
        await onAdd({ date: form.date, person: form.person.toUpperCase(), stock: form.stock.toUpperCase(), qty, price: Number(form.price) });
        setForm({ date: todayISO(), person: '', stock: '', qty: '', price: '' });
        setSaving(false);
      const parseCSV = () => {
        const lines = csvText.trim().split('\n').filter(Boolean); const rows = [];
        lines.forEach((line, i) => {
          const parts = line.split(',').map(s => s.trim());
          if (parts.length < 5) { rows.push({ err: `Row ${i + 1}: need 5 cols`, raw: line }); return; }
          const [date, person, stock, qtyRaw, priceRaw] = parts;
          const qty = Number(qtyRaw); const price = Number(priceRaw);
          if (!date || !person || !stock) { rows.push({ err: `Row ${i + 1}: missing field`, raw: line }); return; }
          if (isNaN(qty) || qty === 0) { rows.push({ err: `Row ${i + 1}: invalid qty`, raw: line }); return; }
          if (isNaN(price) || price <= 0) { rows.push({ err: `Row ${i + 1}: invalid price`, raw: line }); return; }
          rows.push({ date, person: person.toUpperCase(), stock: stock.toUpperCase(), qty, price, ok: true });
        });
        setPreview(rows);
      };

      const importCSV = async () => {
        if (!preview) return;
        const validRows = preview.filter(r => r.ok);
        if (validRows.length === 0) return;
        setSaving(true); setImportProgress({ done: 0, total: validRows.length });
        const uniquePersons = [...new Set(validRows.map(r => r.person))];
        for (const pName of uniquePersons) await onEnsurePerson(pName);
        const chunkSize = 100;
        for (let i = 0; i < validRows.length; i += chunkSize) {
          const chunk = validRows.slice(i, i + chunkSize);
          await onBulkAdd(chunk.map(r => ({ date: r.date, person: r.person, stock: r.stock, qty: r.qty, price: r.price })));
          setImportProgress({ done: Math.min(i + chunkSize, validRows.length), total: validRows.length });
        }
        setImportProgress(null); setPreview(null); setCsvText(''); setCsvMode(false); setSaving(false);
      };

      const valid = transactions.filter(t => isValidDate(t.date) && t.stock && t.person);
      const filtered = valid.filter(t => !search || t.person?.toLowerCase().includes(search.toLowerCase()) || t.stock?.toLowerCase().includes(search.toLowerCase())).sort((a, b) => toJSDate(b.date) - toJSDate(a.date));

      const toggleSelect = (id) => { setSelected(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; }); };
      const selectAll = () => { if (selected.size === filtered.length) setSelected(new Set()); else setSelected(new Set(filtered.map(t => t.id))); };
      const deleteSelected = async () => {
        if (!confirm(`Delete ${selected.size} transaction(s)?`)) return;
        setDeleting(true);
        for (const id of selected) await onDelete(id);
        setSelected(new Set()); setSelectMode(false); setDeleting(false);
      };

      return (
        <div className="page">
          <div className="page-header"><div className="page-title">Transactions</div></div>

          {!csvMode ? (
            <div className="card">
              <div className="card-title">Add Transaction</div>
              <div className="form-row">
                <div><label className="form-label">Date</label><input className="form-input" type="date" value={form.date} onChange={e => set('date', e.target.value)} /></div>
                <div><label className="form-label">Person</label>
                  <select className="select-input" value={form.person} onChange={e => set('person', e.target.value)}>
                    <option value="">Select...</option>{persons.map(p => <option key={p.name}>{p.name}</option>)}
                  </select>
                </div>
                <div><label className="form-label">Stock Name</label><input className="form-input" type="text" value={form.stock} onChange={e => set('stock', e.target.value)} placeholder="ADANI POWER" /></div>
                <div><label className="form-label">Qty (- for Sell)</label><input className="form-input" type="number" value={form.qty} onChange={e => set('qty', e.target.value)} placeholder="100" /></div>
                <div><label className="form-label">Price ₹</label><input className="form-input" type="number" value={form.price} onChange={e => set('price', e.target.value)} placeholder="250.00" /></div>
              </div>
              <div style={{ display: 'flex', gap: '.5rem', marginTop: '.5rem', flexWrap: 'wrap' }}>
                <button className="btn-primary" style={{ width: 'auto', padding: '.55rem 1.5rem' }} onClick={handleAdd} disabled={saving}>{saving ? '...' : '+ ADD TRANSACTION'}</button>
                <button className="btn-secondary" onClick={() => setCsvMode(true)}>IMPORT CSV</button>
              </div>
            </div>
          ) : (
            <div className="card">
              <div className="card-title">Import Transactions via CSV</div>
              <div style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: '.75rem', lineHeight: 1.7 }}>
                Format: <strong>DATE, PERSON, STOCK NAME, QTY, PRICE</strong><br />
                Negative QTY = SELL &nbsp;|&nbsp; Date: DD/MM/YYYY or YYYY-MM-DD<br />
                Example: <code>28/07/2009, NILESH, ADANI POWER, 3680, 100</code>
              </div>
              <textarea className="textarea-input" value={csvText} onChange={e => setCsvText(e.target.value)} placeholder="Paste CSV rows here..." />
              <div style={{ display: 'flex', gap: '.5rem', marginTop: '.5rem' }}>
                <button className="btn-primary" style={{ width: 'auto', padding: '.55rem 1.5rem' }} onClick={parseCSV} disabled={saving}>PREVIEW</button>
                <button className="btn-secondary" onClick={() => { setCsvMode(false); setPreview(null); setCsvText(''); }}>CANCEL</button>
              </div>
              {importProgress && (
                <div className="import-progress">
                  Importing... {importProgress.done} / {importProgress.total} saved
                  <div style={{ marginTop: '.5rem', background: '#c8e6c9', height: 6, borderRadius: 3 }}>
                    <div style={{ background: 'var(--green)', height: '100%', borderRadius: 3, width: `${(importProgress.done / importProgress.total) * 100}%`, transition: 'width .2s' }} />
                  </div>
                </div>
              )}
              {preview && !importProgress && <>
                <hr className="section-divider" />
