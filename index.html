<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── FIREBASE CONFIG ──────────────────────────────────────
// Replace with your Firebase project config
const firebaseConfig = {
  apiKey: "AIzaSyAyuj-wMRRSu5craUeB_dVbsDoM0rO-ceE",
  authDomain: "finance-tracker-70d81.firebaseapp.com",
  projectId: "finance-tracker-70d81",
  storageBucket: "finance-tracker-70d81.firebasestorage.app",
  messagingSenderId: "191924832332",
  appId: "1:191924832332:web:da128b3982e524fcdf4ce9",
  measurementId: "G-0N8JYP9E23"
};

// Initialize Firebase (safe re-init guard)
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ─── HELPERS ─────────────────────────────────────────────
const fmt = (n) => {
  if (n == null || isNaN(n)) return '—';
  return '₹' + Number(n).toLocaleString('en-IN', { maximumFractionDigits: 2 });
};
const fmtPct = (n) => {
  if (n == null || isNaN(n)) return '—';
  return (n >= 0 ? '+' : '') + Number(n).toFixed(2) + '%';
};
const personColor = (name) => {
  const colors = {
    NILESH: '#c8e6c9', HITESH: '#bbdefb', REKHA: '#f8bbd9',
    RASHMI: '#ffe0b2', HEENA: '#e1bee7', PRATIK: '#b3e0f7',
    JITESH: '#fff9c4', NIDHI: '#d7ccc8', DHARA: '#f0f4c3',
    'NILESH HUF': '#a5d6a7', 'HITESH HUF': '#90caf9',
    'DHANVANTRAI HUF': '#ce93d8',
  };
  const u = (name || '').toUpperCase().trim();
  if (colors[u]) return colors[u];
  let h = 0;
  for (let i = 0; i < u.length; i++) h = u.charCodeAt(i) + ((h << 5) - h);
  return `hsl(${Math.abs(h) % 360}, 55%, 80%)`;
};

// ─── FIFO ENGINE ────────────────────────────────────────
function computeFIFO(transactions) {
  const buys = {}; // key -> [{date, price, qty}]
  const sells = [];
  const sorted = [...transactions].sort((a, b) => new Date(a.date) - new Date(b.date));

  sorted.forEach(tx => {
    const key = `${tx.person}|${tx.stock}`;
    if (!buys[key]) buys[key] = [];
    if (tx.qty > 0) {
      buys[key].push({ date: tx.date, price: tx.price, qty: tx.qty });
    } else if (tx.qty < 0) {
      let sellQty = Math.abs(tx.qty);
      const queue = buys[key];
      while (sellQty > 0 && queue && queue.length > 0) {
        const buy = queue[0];
        const used = Math.min(buy.qty, sellQty);
        const profit = (tx.price - buy.price) * used;
        const years = (new Date(tx.date) - new Date(buy.date)) / (1000 * 60 * 60 * 24 * 365);
        const cagr = years > 0 ? (Math.pow(tx.price / buy.price, 1 / years) - 1) * 100 : null;
        sells.push({
          person: tx.person, stock: tx.stock,
          buyDate: buy.date, buyPrice: buy.price,
          sellDate: tx.date, sellPrice: tx.price,
          qty: used, profit, cagr
        });
        buy.qty -= used;
        sellQty -= used;
        if (buy.qty === 0) queue.shift();
      }
    }
  });

  // Remaining holdings
  const holdings = {};
  Object.entries(buys).forEach(([key, lots]) => {
    const [person, stock] = key.split('|');
    const remaining = lots.filter(l => l.qty > 0);
    if (remaining.length === 0) return;
    if (!holdings[stock]) holdings[stock] = {};
    if (!holdings[stock][person]) holdings[stock][person] = [];
    holdings[stock][person] = remaining;
  });

  return { sells, holdings };
}

function buildPortfolio(holdings, stockPrices) {
  const rows = [];
  Object.entries(holdings).forEach(([stock, persons]) => {
    Object.entries(persons).forEach(([person, lots]) => {
      const totalQty = lots.reduce((s, l) => s + l.qty, 0);
      const investedVal = lots.reduce((s, l) => s + l.qty * l.price, 0);
      const avgBuy = investedVal / totalQty;
      const currentPrice = stockPrices[stock] || stockPrices[stock.replace('NSE:', '')] || null;
      const currentVal = currentPrice ? totalQty * currentPrice : null;
      const absGain = currentVal != null ? currentVal - investedVal : null;
      const absGainPct = absGain != null ? (absGain / investedVal) * 100 : null;
      const breakup = lots.map(l => `${l.qty} @ ${l.price}`).join(', ');
      rows.push({ person, stock, totalQty, avgBuy, investedVal, currentPrice, currentVal, absGain, absGainPct, breakup });
    });
  });
  return rows;
}

function buildStockSheet(holdings, stockPrices) {
  const stocks = {};
  Object.entries(holdings).forEach(([stock, persons]) => {
    if (!stocks[stock]) stocks[stock] = { stock, totalQty: 0, investedVal: 0, persons: {} };
    Object.entries(persons).forEach(([person, lots]) => {
      const qty = lots.reduce((s, l) => s + l.qty, 0);
      const inv = lots.reduce((s, l) => s + l.qty * l.price, 0);
      stocks[stock].totalQty += qty;
      stocks[stock].investedVal += inv;
      if (!stocks[stock].persons[person]) stocks[stock].persons[person] = { qty: 0, lots: [] };
      stocks[stock].persons[person].qty += qty;
      stocks[stock].persons[person].lots.push(...lots);
    });
  });
  return Object.values(stocks).map(s => {
    const currentPrice = stockPrices[s.stock] || stockPrices[s.stock.replace('NSE:', '')] || null;
    const currentVal = currentPrice ? s.totalQty * currentPrice : null;
    const absGain = currentVal != null ? currentVal - s.investedVal : null;
    const absGainPct = absGain != null ? (absGain / s.investedVal) * 100 : null;
    return { ...s, avgBuy: s.investedVal / s.totalQty, currentPrice, currentVal, absGain, absGainPct };
  });
}

// ─── AUTH PAGE ───────────────────────────────────────────
function AuthPage() {
  const [tab, setTab] = useState('login');
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');
  const [name, setName] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  const doLogin = async () => {
    setErr(''); setLoading(true);
    try { await auth.signInWithEmailAndPassword(email, pass); }
    catch (e) { setErr(e.message); }
    setLoading(false);
  };
  const doSignup = async () => {
    setErr(''); setLoading(true);
    try {
      const cred = await auth.createUserWithEmailAndPassword(email, pass);
      await cred.user.updateProfile({ displayName: name });
    } catch (e) { setErr(e.message); }
    setLoading(false);
  };
  const doGoogle = async () => {
    setErr(''); setLoading(true);
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      await auth.signInWithPopup(provider);
    } catch (e) { setErr(e.message); }
    setLoading(false);
  };

  return (
    <div className="auth-wrapper">
      <div className="auth-card">
        <div className="auth-brand">Investment</div>
        <div className="auth-title">Tracker</div>
        <div className="auth-tabs">
          <button className={`auth-tab${tab==='login'?' active':''}`} onClick={()=>setTab('login')}>Login</button>
          <button className={`auth-tab${tab==='signup'?' active':''}`} onClick={()=>setTab('signup')}>Sign Up</button>
        </div>
        {tab==='signup' && (
          <div className="form-group">
            <label className="form-label">Name</label>
            <input className="form-input" type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="Your name" />
          </div>
        )}
        <div className="form-group">
          <label className="form-label">Email</label>
          <input className="form-input" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@email.com" />
        </div>
        <div className="form-group">
          <label className="form-label">Password</label>
          <input className="form-input" type="password" value={pass} onChange={e=>setPass(e.target.value)} placeholder="••••••••"
            onKeyDown={e=>e.key==='Enter' && (tab==='login'?doLogin():doSignup())} />
        </div>
        {err && <div className="auth-error">{err}</div>}
        <button className="btn-primary" onClick={tab==='login'?doLogin:doSignup} disabled={loading}>
          {loading ? '...' : tab==='login' ? 'LOGIN' : 'CREATE ACCOUNT'}
        </button>
        <div className="divider">or</div>
        <button className="btn-google" onClick={doGoogle} disabled={loading}>
          <svg width="16" height="16" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71C3.784 10.17 3.682 9.593 3.682 9s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
          Continue with Google
        </button>
      </div>
    </div>
  );
}

// ─── DASHBOARD TAB ───────────────────────────────────────
function DashboardTab({ transactions, stockPrices }) {
  const { sells, holdings } = computeFIFO(transactions);
  const portfolio = buildPortfolio(holdings, stockPrices);
  const totalInvested = portfolio.reduce((s, r) => s + r.investedVal, 0);
  const totalCurrent = portfolio.reduce((s, r) => s + (r.currentVal || r.investedVal), 0);
  const totalGain = totalCurrent - totalInvested;
  const gainPct = totalInvested > 0 ? (totalGain / totalInvested) * 100 : 0;
  const dayChange = portfolio.reduce((s, r) => s + (r.absGain || 0), 0);

  // Top gainer / loser by stock
  const stocks = buildStockSheet(holdings, stockPrices);
  const withGain = stocks.filter(s => s.absGain != null);
  const topGainer = withGain.sort((a, b) => b.absGain - a.absGain)[0];
  const topLoser = withGain.sort((a, b) => a.absGain - b.absGain)[0];

  // Person distribution
  const byPerson = {};
  portfolio.forEach(r => {
    if (!byPerson[r.person]) byPerson[r.person] = 0;
    byPerson[r.person] += r.currentVal || r.investedVal;
  });

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-title">Dashboard</div>
        <div className="page-sub">{new Date().toLocaleDateString('en-IN', { month: 'long', year: 'numeric' })}</div>
      </div>

// ─── TRANSACTIONS TAB ────────────────────────────────────
function TransactionsTab({ transactions, onAdd, onDelete }) {
  const [form, setForm] = useState({ date: '', person: '', stock: '', qty: '', price: '', type: 'BUY' });
  const [csvMode, setCsvMode] = useState(false);
  const [csvText, setCsvText] = useState('');
  const [preview, setPreview] = useState(null);
  const [saving, setSaving] = useState(false);
  const [search, setSearch] = useState('');

  const PERSONS = ['NILESH','HITESH','REKHA','RASHMI','HEENA','PRATIK','JITESH','NIDHI','DHARA','NILESH HUF','HITESH HUF','DHANVANTRAI HUF'];

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const handleAdd = async () => {
    if (!form.date || !form.person || !form.stock || !form.qty || !form.price) return;
    setSaving(true);
    const qty = form.type === 'SELL' ? -Math.abs(Number(form.qty)) : Math.abs(Number(form.qty));
    await onAdd({ date: form.date, person: form.person.toUpperCase(), stock: form.stock.toUpperCase(), qty, price: Number(form.price) });
    setForm({ date: '', person: '', stock: '', qty: '', price: '', type: 'BUY' });
    setSaving(false);
  };

  const parseCSV = () => {
    const lines = csvText.trim().split('\n').filter(Boolean);
    const rows = [];
    lines.forEach((line, i) => {
      const parts = line.split(',').map(s => s.trim());
      if (parts.length < 5) { rows.push({ err: `Row ${i+1}: need 5 columns (DATE,PERSON,STOCK,QTY,PRICE)`, raw: line }); return; }
      const [date, person, stock, qtyRaw, priceRaw] = parts;
      const qty = Number(qtyRaw);
      const price = Number(priceRaw);
      if (!date || !person || !stock) { rows.push({ err: `Row ${i+1}: missing field`, raw: line }); return; }
      if (isNaN(qty) || qty === 0) { rows.push({ err: `Row ${i+1}: invalid qty`, raw: line }); return; }
      if (isNaN(price) || price <= 0) { rows.push({ err: `Row ${i+1}: invalid price`, raw: line }); return; }
      rows.push({ date, person: person.toUpperCase(), stock: stock.toUpperCase(), qty, price, ok: true });
    });
    setPreview(rows);
  };

  const importCSV = async () => {
    if (!preview) return;
    setSaving(true);
    const validRows = preview.filter(r => r.ok);
    for (const row of validRows) await onAdd(row);
    setPreview(null); setCsvText(''); setCsvMode(false);
    setSaving(false);
  };

  const filtered = transactions.filter(t =>
    !search || t.person?.toLowerCase().includes(search.toLowerCase()) ||
    t.stock?.toLowerCase().includes(search.toLowerCase())
  );

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-title">Transactions</div>
      </div>

      {!csvMode ? (
        <div className="card">
          <div className="card-title">Add Transaction</div>
          <div className="form-row">
            <div>
              <label className="form-label">Date</label>
              <input className="form-input" type="date" value={form.date} onChange={e=>set('date',e.target.value)} />
            </div>
            <div>
              <label className="form-label">Person</label>
              <select className="select-input" value={form.person} onChange={e=>set('person',e.target.value)}>
                <option value="">Select...</option>
                {PERSONS.map(p => <option key={p}>{p}</option>)}
              </select>
            </div>
            <div>
              <label className="form-label">Stock Code</label>
              <input className="form-input" type="text" value={form.stock} onChange={e=>set('stock',e.target.value)} placeholder="NSE:ADANIPOWER" />
            </div>
            <div>
              <label className="form-label">Type</label>
              <select className="select-input" value={form.type} onChange={e=>set('type',e.target.value)}>
                <option value="BUY">BUY</option>
                <option value="SELL">SELL</option>
              </select>
            </div>
            <div>
              <label className="form-label">Quantity</label>
              <input className="form-input" type="number" value={form.qty} onChange={e=>set('qty',e.target.value)} placeholder="100" />
            </div>
            <div>
              <label className="form-label">Price ₹</label>
              <input className="form-input" type="number" value={form.price} onChange={e=>set('price',e.target.value)} placeholder="250.00" />
            </div>
          </div>
          <div style={{ display: 'flex', gap: '0.5rem', marginTop: '0.5rem' }}>
            <button className="btn-primary" style={{ width: 'auto', padding: '0.55rem 1.5rem' }} onClick={handleAdd} disabled={saving}>
              {saving ? '...' : '+ ADD TRANSACTION'}
            </button>
            <button className="btn-secondary" onClick={()=>setCsvMode(true)}>IMPORT CSV</button>
          </div>
        </div>
      ) : (
        <div className="card">
          <div className="card-title">Import Transactions via CSV</div>
          <div style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: '0.75rem', lineHeight: 1.6 }}>
            Format: <strong>DATE, PERSON, STOCK, QTY, PRICE</strong><br/>
            Date formats: DD/MM/YYYY or YYYY-MM-DD | Negative QTY = SELL<br/>
            Example: <code>28/07/2009, NILESH, NSE:ADANIPOWER, 3680, 100</code>
          </div>
          <textarea className="textarea-input" value={csvText} onChange={e=>setCsvText(e.target.value)} placeholder="Paste CSV here..." />
          <div style={{ display: 'flex', gap: '0.5rem', marginTop: '0.5rem' }}>
            <button className="btn-primary" style={{ width: 'auto', padding: '0.55rem 1.5rem' }} onClick={parseCSV}>PREVIEW</button>
            <button className="btn-secondary" onClick={()=>{ setCsvMode(false); setPreview(null); setCsvText(''); }}>CANCEL</button>
          </div>
          {preview && (
            <>
              <hr className="section-divider" />
              <div className="card-title">Preview ({preview.filter(r=>r.ok).length} valid, {preview.filter(r=>!r.ok).length} errors)</div>
              <div className="table-wrap">
                <table className="preview-table">
                  <thead><tr><th>Date</th><th>Person</th><th>Stock</th><th>Qty</th><th>Price</th><th>Status</th></tr></thead>
                  <tbody>
                    {preview.map((r, i) => (
                      <tr key={i} className={r.ok ? 'preview-ok' : 'preview-err'}>
                        <td>{r.date || '—'}</td>
                        <td>{r.person || '—'}</td>
                        <td>{r.stock || '—'}</td>
                        <td>{r.qty}</td>
                        <td>{r.price}</td>
                        <td>{r.ok ? '✓' : r.err}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              {preview.some(r=>r.ok) && (
                <button className="btn-primary" style={{ width: 'auto', padding: '0.55rem 1.5rem', marginTop: '0.75rem' }}
                  onClick={importCSV} disabled={saving}>
                  {saving ? '...' : `IMPORT ${preview.filter(r=>r.ok).length} ROWS`}
                </button>
              )}
            </>
          )}
        </div>
      )}

      <div className="card">
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '0.75rem' }}>
          <div className="card-title" style={{ margin: 0 }}>All Transactions ({filtered.length})</div>
          <input className="form-input" style={{ width: 200, fontSize: 12 }} placeholder="Search..." value={search} onChange={e=>setSearch(e.target.value)} />
        </div>
        <div className="table-wrap">
          <table>
            <thead><tr><th>Date</th><th>Person</th><th>Stock</th><th>Qty</th><th>Price</th><th>Type</th><th></th></tr></thead>
            <tbody>
              {filtered.length === 0 && <tr><td colSpan="7"><div className="empty">No transactions yet</div></td></tr>}
              {filtered.slice().sort((a,b)=>new Date(b.date)-new Date(a.date)).map(tx => (
                <tr key={tx.id}>
                  <td>{new Date(tx.date).toLocaleDateString('en-IN')}</td>
                  <td><span className="tag" style={{ background: personColor(tx.person), color: '#1a1a1a' }}>{tx.person}</span></td>
                  <td style={{ fontWeight: 700 }}>{tx.stock}</td>
                  <td className={tx.qty > 0 ? 'pos' : 'neg'}>{tx.qty > 0 ? '+' : ''}{tx.qty}</td>
                  <td>{fmt(tx.price)}</td>
                  <td><span className={`tag ${tx.qty > 0 ? 'badge-green' : 'badge-red'}`}>{tx.qty > 0 ? 'BUY' : 'SELL'}</span></td>
                  <td><button className="btn-danger" onClick={()=>onDelete(tx.id)}>✕</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── STOCK PRICES TAB ────────────────────────────────────
function StockPricesTab({ stockPrices, onUpdatePrices }) {
  const [csvText, setCsvText] = useState('');
  const [preview, setPreview] = useState(null);
  const [saving, setSaving] = useState(false);

  const parsePriceCSV = () => {
    const lines = csvText.trim().split('\n').filter(Boolean);
    const rows = [];
    lines.forEach((line, i) => {
      const parts = line.split(',').map(s => s.trim());
      if (parts.length < 2) { rows.push({ err: `Row ${i+1}: need STOCK,PRICE`, raw: line }); return; }
      const [stock, priceRaw] = parts;
      const price = parseFloat(priceRaw.replace(/[₹,]/g, ''));
      if (!stock) { rows.push({ err: `Row ${i+1}: missing stock`, raw: line }); return; }
      if (isNaN(price) || price <= 0) { rows.push({ err: `Row ${i+1}: invalid price`, raw: line }); return; }
      rows.push({ stock: stock.toUpperCase(), price, ok: true });
    });
    setPreview(rows);
  };

  const importPrices = async () => {
    if (!preview) return;
    setSaving(true);
    const updates = {};
    preview.filter(r => r.ok).forEach(r => { updates[r.stock] = r.price; });
    await onUpdatePrices(updates);
    setPreview(null); setCsvText('');
    setSaving(false);
  };

  return (
    <div className="page">
      <div className="page-header">
        <div className="page-title">Update Stock Prices</div>
        <div className="page-sub">Paste CSV with current prices</div>
      </div>
      <div className="card">
        <div className="card-title">Import Price CSV</div>
        <div style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: '0.75rem', lineHeight: 1.6 }}>
          Format: <strong>STOCK_CODE, CURRENT_PRICE</strong><br/>
          Example: <code>NSE:ADANIPOWER, 181.94</code> or <code>ADANIPOWER, 181.94</code>
        </div>
        <textarea className="textarea-input" value={csvText} onChange={e=>setCsvText(e.target.value)} placeholder="NSE:ADANIPOWER, 181.94&#10;NSE:BHEL, 291.12&#10;NSE:BPCL, 292.15" />
        <div style={{ display: 'flex', gap: '0.5rem', marginTop: '0.5rem' }}>
          <button className="btn-primary" style={{ width: 'auto', padding: '0.55rem 1.5rem' }} onClick={parsePriceCSV}>PREVIEW</button>
          {preview && <button className="btn-secondary" onClick={()=>setPreview(null)}>CLEAR</button>}
        </div>
        {preview && (
          <>
            <hr className="section-divider" />
            <div className="card-title">Preview ({preview.filter(r=>r.ok).length} valid)</div>
            <div className="table-wrap">
              <table className="preview-table">
                <thead><tr><th>Stock</th><th>Price</th><th>Status</th></tr></thead>
                <tbody>
                  {preview.map((r, i) => (
                    <tr key={i} className={r.ok ? 'preview-ok' : 'preview-err'}>
                      <td>{r.stock || r.raw}</td>
                      <td>{r.ok ? fmt(r.price) : '—'}</td>
                      <td>{r.ok ? '✓' : r.err}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            {preview.some(r=>r.ok) && (
              <button className="btn-primary" style={{ width: 'auto', padding: '0.55rem 1.5rem', marginTop: '0.75rem' }}
                onClick={importPrices} disabled={saving}>
                {saving ? '...' : `UPDATE ${preview.filter(r=>r.ok).length} PRICES`}
              </button>
            )}
          </>
        )}
      </div>

      <div className="card">
        <div className="card-title">Current Prices ({Object.keys(stockPrices).length} stocks)</div>
        {Object.keys(stockPrices).length === 0 ? (
          <div className="empty">No prices loaded yet</div>
        ) : (
          <div className="table-wrap">
            <table>
              <thead><tr><th>Stock</th><th>Current Price</th></tr></thead>
              <tbody>
                {Object.entries(stockPrices).map(([s, p]) => (
                  <tr key={s}><td style={{ fontWeight: 700 }}>{s}</td><td>{fmt(p)}</td></tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(undefined); // undefined = loading
  const [tab, setTab] = useState('dashboard');
  const [transactions, setTransactions] = useState([]);
  const [stockPrices, setStockPrices] = useState({});
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [loading, setLoading] = useState(true);

  // Touch swipe for sidebar
  const touchStartX = useRef(null);
  useEffect(() => {
    const onTouchStart = e => { touchStartX.current = e.touches[0].clientX; };
    const onTouchEnd = e => {
      if (touchStartX.current === null) return;
      const dx = e.changedTouches[0].clientX - touchStartX.current;
      if (dx > 60 && touchStartX.current < 40) setSidebarOpen(true);
      if (dx < -60) setSidebarOpen(false);
      touchStartX.current = null;
    };
    document.addEventListener('touchstart', onTouchStart);
    document.addEventListener('touchend', onTouchEnd);
    return () => { document.removeEventListener('touchstart', onTouchStart); document.removeEventListener('touchend', onTouchEnd); };
  }, []);

  // Auth state
  useEffect(() => {
    const unsub = auth.onAuthStateChanged(u => { setUser(u || null); });
    return unsub;
  }, []);

  // Load data
  useEffect(() => {
    if (!user) { setLoading(false); return; }
    const uid = user.uid;
    setLoading(true);

    // Use demo/local storage if Firebase not configured
    const isDemoMode = firebaseConfig.apiKey.includes('DEMO');

    if (isDemoMode) {
      // Demo mode: use localStorage
      const txs = JSON.parse(localStorage.getItem(`txs_${uid}`) || '[]');
      const prices = JSON.parse(localStorage.getItem(`prices_${uid}`) || '{}');
      setTransactions(txs);
      setStockPrices(prices);
      setLoading(false);
      return;
    }

    const txUnsub = db.collection(`users/${uid}/transactions`)
      .orderBy('date', 'desc')
      .onSnapshot(snap => {
        setTransactions(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        setLoading(false);
      });

    const priceUnsub = db.collection(`users/${uid}/meta`)
      .doc('stockPrices')
      .onSnapshot(snap => {
        if (snap.exists) setStockPrices(snap.data().prices || {});
      });

    return () => { txUnsub(); priceUnsub(); };
  }, [user]);

  const addTransaction = async (tx) => {
    if (!user) return;
    const uid = user.uid;
    const isDemoMode = firebaseConfig.apiKey.includes('DEMO');
    const newTx = { ...tx, createdAt: new Date().toISOString(), id: tx.id || Date.now().toString() };

    if (isDemoMode) {
      const txs = JSON.parse(localStorage.getItem(`txs_${uid}`) || '[]');
      txs.push(newTx);
      localStorage.setItem(`txs_${uid}`, JSON.stringify(txs));
      setTransactions([...txs]);
      return;
    }
    await db.collection(`users/${uid}/transactions`).add(tx);
  };

  const deleteTransaction = async (id) => {
    if (!user) return;
    const uid = user.uid;
    const isDemoMode = firebaseConfig.apiKey.includes('DEMO');
    if (isDemoMode) {
      const txs = JSON.parse(localStorage.getItem(`txs_${uid}`) || '[]').filter(t => t.id !== id);
      localStorage.setItem(`txs_${uid}`, JSON.stringify(txs));
      setTransactions(txs);
      return;
    }
    await db.collection(`users/${uid}/transactions`).doc(id).delete();
  };

  const updatePrices = async (updates) => {
    if (!user) return;
    const uid = user.uid;
    const isDemoMode = firebaseConfig.apiKey.includes('DEMO');
    const merged = { ...stockPrices, ...updates };
    if (isDemoMode) {
      localStorage.setItem(`prices_${uid}`, JSON.stringify(merged));
      setStockPrices(merged);
      return;
    }
    await db.collection(`users/${uid}/meta`).doc('stockPrices').set({ prices: merged });
  };

  if (user === undefined) return <div className="spinner">Loading...</div>;
  if (!user) return <AuthPage />;

  const navItems = [
    { key: 'dashboard', label: 'Dashboard', icon: '▦' },
    { key: 'transactions', label: 'Transactions', icon: '↕' },
    { key: 'portfolio', label: 'Portfolio', icon: '◈' },
    { key: 'stocks', label: 'Stocks', icon: '◉' },
    { key: 'fifo', label: 'FIFO Results', icon: '⟳' },
    { key: 'prices', label: 'Stock Prices', icon: '⬆' },
  ];

  const goTo = (key) => { setTab(key); setSidebarOpen(false); };

  return (
    <div className="app">
      <button className="menu-toggle" onClick={() => setSidebarOpen(o => !o)}>☰</button>
      <div className={`sidebar-overlay${sidebarOpen ? ' open' : ''}`} onClick={() => setSidebarOpen(false)} />

      <nav className={`sidebar${sidebarOpen ? ' open' : ''}`}>
        <div className="sidebar-brand">
          <div className="sidebar-brand-sub">Investment</div>
          <div className="sidebar-brand-name">Tracker</div>
        </div>
        <div className="sidebar-nav">
          {navItems.map(item => (
            <button key={item.key} className={`sidebar-item${tab===item.key?' active':''}`} onClick={() => goTo(item.key)}>
              <span className="sidebar-icon">{item.icon}</span>
              {item.label}
            </button>
          ))}
        </div>
        <div className="sidebar-footer">
          <div className="sidebar-user">{user.displayName || user.email}</div>
          <button className="btn-logout" onClick={() => auth.signOut()}>LOGOUT</button>
        </div>
      </nav>

      <main className="main">
        {loading ? (
          <div className="spinner">Loading data...</div>
        ) : (
          <>
            {tab === 'dashboard' && <DashboardTab transactions={transactions} stockPrices={stockPrices} />}
            {tab === 'transactions' && <TransactionsTab transactions={transactions} onAdd={addTransaction} onDelete={deleteTransaction} />}
            {tab === 'portfolio' && <PortfolioTab transactions={transactions} stockPrices={stockPrices} />}
            {tab === 'stocks' && <StocksTab transactions={transactions} stockPrices={stockPrices} />}
            {tab === 'fifo' && <FIFOTab transactions={transactions} />}
            {tab === 'prices' && <StockPricesTab stockPrices={stockPrices} onUpdatePrices={updatePrices} />}
          </>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
