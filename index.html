    function StockPricesTab({ stockPrices, onUpdatePrices, onDeletePrice, uid, priceMeta, transactions, assetTypes, assetTypeColors }) {
      const [csvText, setCsvText] = useState('');
      const [preview, setPreview] = useState(null);
      const [saving, setSaving] = useState(false);
      const [editEntry, setEditEntry] = useState(null);
      const [selected, setSelected] = useState(new Set());
      const [selectMode, setSelectMode] = useState(false);
      const [deleting, setDeleting] = useState(false);
      const [filterAssets, setFilterAssets] = useState(['All']);
      const [filterAssetTypes, setFilterAssetTypes] = useState(['All']);

      const parse = () => {
        const lines = csvText.trim().split('\n').filter(Boolean); const rows = [];
        lines.forEach((line, i) => {
          const parts = line.split(',').map(s => s.trim());
          if (parts.length < 2) { rows.push({ err: `Row ${i + 1}: need STOCK,PRICE`, raw: line }); return; }
          const [stock, priceRaw] = parts;
          const price = parseFloat(priceRaw.replace(/[₹,]/g, ''));
          if (!stock) { rows.push({ err: `Row ${i + 1}: missing stock` }); return; }
          if (isNaN(price) || price <= 0) { rows.push({ err: `Row ${i + 1}: invalid price`, raw: line }); return; }
          rows.push({ stock: stock.toUpperCase(), price, ok: true });
        });
        setPreview(rows);
      };

      const doImport = async () => {
        if (!preview) return; setSaving(true);
        const updates = {}; preview.filter(r => r.ok).forEach(r => { updates[r.stock] = r.price; });
        await onUpdatePrices(updates); setPreview(null); setCsvText(''); setSaving(false);
      };

      const handleEditSave = async (oldStock, newStock, price) => {
        if (oldStock !== newStock) {
          const updated = { ...stockPrices };
          delete updated[oldStock];
          updated[newStock] = price;
          await onUpdatePrices(updated, true);
          const snap = await db.collection(`users/${uid}/inv_transactions`).where('stock', '==', oldStock).get();
          if (!snap.empty) {
            const batch = db.batch();
            snap.docs.forEach(doc => batch.update(doc.ref, { stock: newStock }));
            await batch.commit();
          }
        } else {
          await onUpdatePrices({ [newStock]: price });
        }
      };

      const handleDelete = async (stock) => { await onDeletePrice(stock); };

      const toggleSelect = (s) => { setSelected(prev => { const n = new Set(prev); n.has(s) ? n.delete(s) : n.add(s); return n; }); };
      const selectAll = () => {
        const all = filteredEntries.map(e => e.stock);
        if (selected.size === all.length) setSelected(new Set());
        else setSelected(new Set(all));
      };
      const deleteSelected = async () => {
        if (!confirm(`Delete ${selected.size} price(s)?`)) return;
        setDeleting(true);
        for (const s of selected) await onDeletePrice(s);
        setSelected(new Set()); setSelectMode(false); setDeleting(false);
      };

      const typesList = (assetTypes || []).map(t => t.name).sort();
      const assetList = Object.keys(stockPrices || {}).sort();
      const getTypeForAsset = (stock) => {
        const tx = (transactions || []).slice().reverse().find(t => t.stock === stock && t.assetType);
        return (tx?.assetType || (transactions || []).find(t => t.stock === stock)?.assetType || '—');
      };

      const allEntries = Object.entries(stockPrices).map(([s, p]) => ({ stock: s, price: p, assetType: getTypeForAsset(s) }));
      const filteredEntries = allEntries
        .filter(e => (filterAssets.includes('All') || filterAssets.includes(e.stock)))
        .filter(e => (filterAssetTypes.includes('All') || filterAssetTypes.includes(e.assetType)))
        .sort((a, b) => a.stock.localeCompare(b.stock));

      return (
        <div className="page">
          <div className="page-header">
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '1rem' }}>
              <div className="page-title">Asset Prices</div>
              {priceMeta.lastUpdated && (
                <div style={{ fontSize: 11, color: 'var(--amber)', background: 'var(--amber-bg)', padding: '4px 10px', border: '1px solid #ffe082', fontWeight: 700, letterSpacing: '.05em' }}>
                  LAST SYNCED: {new Date(priceMeta.lastUpdated).toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' })}
                </div>
              )}
            </div>
            <div className="page-sub">Click any row to edit — paste CSV to bulk update</div>
          </div>

          <div className="card">
            <div className="card-title">Import Price CSV</div>
            <div style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: '.75rem', lineHeight: 1.7 }}>
              Format: <strong>STOCK NAME, CURRENT PRICE</strong><br />
              Example: <code>ADANI POWER, 181.94</code>
            </div>
            <textarea className="textarea-input" value={csvText} onChange={e => setCsvText(e.target.value)} placeholder={"ADANI POWER, 181.94\nBHEL, 291.12"} />
            <div style={{ display: 'flex', gap: '.5rem', marginTop: '.5rem' }}>
              <button className="btn-primary" style={{ width: 'auto', padding: '.55rem 1.5rem' }} onClick={parse}>PREVIEW</button>
              {preview && <button className="btn-secondary" onClick={() => setPreview(null)}>CLEAR</button>}
            </div>
            {preview && <>
              <hr className="section-divider" />
              <div className="card-title">Preview — {preview.filter(r => r.ok).length} valid</div>
              <div className="table-wrap">
                <table className="preview-table">
                  <thead><tr><th>Stock</th><th>Price</th><th>Status</th></tr></thead>
                  <tbody>{preview.map((r, i) => <tr key={i} className={r.ok ? 'preview-ok' : 'preview-err'}><td>{r.stock || r.raw}</td><td>{r.ok ? fmt(r.price) : '—'}</td><td>{r.ok ? '✓' : r.err}</td></tr>)}</tbody>
                </table>
              </div>
              {preview.some(r => r.ok) && <button className="btn-primary" style={{ width: 'auto', padding: '.55rem 1.5rem', marginTop: '.75rem' }} onClick={doImport} disabled={saving}>{saving ? '...' : `UPDATE ${preview.filter(r => r.ok).length} PRICES`}</button>}
            </>}
          </div>

          <div className="card">
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '.75rem' }}>
              <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
                <div className="card-title" style={{ margin: 0 }}>STORED PRICES ({filteredEntries.length})</div>
              </div>
              <button className="btn-sm" onClick={() => { setSelectMode(s => !s); setSelected(new Set()); }}>{selectMode ? 'CANCEL' : 'SELECT'}</button>
            </div>

            <div className="filter-bar" style={{ display: 'flex', gap: '1rem', flexWrap: 'wrap', alignItems: 'flex-end', marginBottom: '.75rem' }}>
              <MultiSelect label="Asset" options={assetList} selected={filterAssets} onChange={setFilterAssets} />
              <MultiSelect label="Asset Type" options={typesList} selected={filterAssetTypes} onChange={setFilterAssetTypes} />
              <button className="btn-sm btn-reset" onClick={() => { setFilterAssets(['All']); setFilterAssetTypes(['All']); }} title="Reset Filters">↺</button>
            </div>

            {selectMode && selected.size > 0 && (
              <div className="bulk-bar">
                <span className="bulk-bar-text">{selected.size} selected</span>
                <button className="btn-danger" onClick={deleteSelected} disabled={deleting}>{deleting ? 'DELETING...' : 'DELETE SELECTED'}</button>
                <button className="btn-secondary" onClick={() => setSelected(new Set())}>CLEAR</button>
              </div>
            )}
            {selectMode && (
              <div style={{ marginBottom: '.5rem' }}>
                <button className="btn-sm" onClick={selectAll}>{selected.size === filteredEntries.length ? 'DESELECT ALL' : 'SELECT ALL'}</button>
              </div>
            )}

            {filteredEntries.length === 0 ? <div className="empty">No prices loaded yet</div> : (
              <div className="table-wrap">
                <table>
                  <thead><tr>
                    {selectMode && <th><input type="checkbox" checked={selected.size === filteredEntries.length && filteredEntries.length > 0} onChange={selectAll} /></th>}
                    <th>Asset</th><th>Asset Type</th><th>Price</th><th style={{ textAlign: 'right' }}>Actions</th>
                  </tr></thead>
                  <tbody>
                    {filteredEntries.map((e) => (
                      <tr key={e.stock} className="clickable" style={selected.has(e.stock) ? { background: '#fffde7' } : {}} onClick={() => selectMode ? toggleSelect(e.stock) : setEditEntry({ stock: e.stock, price: e.price })}>
                        {selectMode && <td onClick={ev => ev.stopPropagation()}><input type="checkbox" checked={selected.has(e.stock)} onChange={() => toggleSelect(e.stock)} /></td>}
                        <td style={{ fontWeight: 700 }}>{e.stock}</td>
                        <td><span className="tag" style={{ background: e.assetType !== '—' ? assetTypeColor(e.assetType, assetTypeColors) : '#e5e7eb', color: '#1a1a1a', fontSize: 10 }}>{e.assetType}</span></td>
                        <td style={{ whiteSpace: 'normal' }}>{fmt(e.price)}</td>
                        <td style={{ textAlign: 'right', whiteSpace: 'normal' }}>
                          <button className="btn-sm" onClick={ev => { ev.stopPropagation(); setEditEntry({ stock: e.stock, price: e.price }); }}>EDIT</button>
                          {' '}
                          <button className="btn-sm-danger" onClick={ev => { ev.stopPropagation(); if (confirm(`Delete "${e.stock}"?`)) handleDelete(e.stock); }}>DEL</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>

          {editEntry && <EditPriceModal stock={editEntry.stock} price={editEntry.price} onSave={handleEditSave} onDelete={handleDelete} onClose={() => setEditEntry(null)} />}
        </div>
      );
    }

    // ── EDIT PERSON MODAL ─────────────────────────────────────
    function EditPersonModal({ person, onSave, onClose, onDelete }) {
      const [name, setName] = useState(person.name || '');
      const [saveState, setSaveState] = useState('idle');
      const handleSave = async () => {
        if (!name.trim()) return; setSaveState('saving');
        await onSave(person.id, { name: name.toUpperCase().trim() }, person.name);
        setSaveState('saved');
        setTimeout(() => onClose(), 400);
      };
      const handleDelete = async () => {
        if (!confirm(`Delete "${person.name}"?\nThis won't delete their transactions.`)) return;
        await onDelete(person.id); onClose();
      };
      return (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
          <div className="modal">
            <div className="modal-title">Edit Person <button className="modal-close" onClick={onClose}>✕</button></div>
            <div className="form-group">
              <label className="form-label">Name</label>
              <input className="form-input" type="text" value={name} onChange={e => setName(e.target.value)} autoFocus onKeyDown={e => e.key === 'Enter' && handleSave()} />
            </div>
            <div style={{ fontSize: 12, color: 'var(--amber)', background: 'var(--amber-bg)', padding: '.6rem .75rem', marginBottom: '.75rem', border: '1px solid #ffe082' }}>
              ⚠ Renaming will also update this person's name in all their transactions.
            </div>
            <div className="modal-actions">
              {saveState === 'saved'
                ? <span className="save-feedback">✓ SAVED</span>
                : <button className="btn-primary" style={{ width: 'auto', padding: '.55rem 1.5rem' }} onClick={handleSave} disabled={saveState === 'saving'}>{saveState === 'saving' ? 'SAVING...' : 'SAVE & UPDATE'}</button>
              }
              <button className="btn-secondary" onClick={onClose}>CANCEL</button>
              <button className="btn-sm-danger" style={{ marginLeft: 'auto' }} onClick={handleDelete}>DELETE</button>
            </div>
          </div>
        </div>
      );
    }

    // ── PERSONS TAB ───────────────────────────────────────────
    function PersonsTab({ persons, onAdd, onUpdate, onDelete, personColors, onColorChange }) {
      const [newName, setNewName] = useState('');
      const [saving, setSaving] = useState(false);
      const [editPerson, setEditPerson] = useState(null);
      const [dupError, setDupError] = useState('');
      const [selected, setSelected] = useState(new Set());
      const [selectMode, setSelectMode] = useState(false);
      const [deleting, setDeleting] = useState(false);

      const handleAdd = async () => {
        if (!newName.trim()) return;
        const upper = newName.toUpperCase().trim();
        if (persons.some(p => p.name.toUpperCase() === upper)) { setDupError(`"${upper}" already exists!`); return; }
        setDupError(''); setSaving(true);
        await onAdd({ name: upper });
        setNewName(''); setSaving(false);
      };

      const toggleSelect = (id) => { setSelected(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; }); };
      const selectAll = () => { if (selected.size === persons.length) setSelected(new Set()); else setSelected(new Set(persons.map(p => p.id))); };
      const deleteSelected = async () => {
        if (!confirm(`Delete ${selected.size} person(s)?\nThis won't delete their transactions.`)) return;
        setDeleting(true);
        for (const id of selected) await onDelete(id);
        setSelected(new Set()); setSelectMode(false); setDeleting(false);
      };

      return (
        <div className="page">
          <div className="page-header"><div className="page-title">Persons</div><div className="page-sub">Manage investor profiles &amp; colors</div></div>
          <div className="card">
            <div className="card-title">Add Person</div>
            <div style={{ display: 'flex', gap: '.5rem', alignItems: 'flex-end' }}>
              <div style={{ flex: 1 }}>
                <label className="form-label">Name</label>
                <input className="form-input" type="text" value={newName} onChange={e => { setNewName(e.target.value); setDupError(''); }} placeholder="E.g. NILESH" onKeyDown={e => e.key === 'Enter' && handleAdd()} />
                {dupError && <div className="dup-error">{dupError}</div>}
              </div>
              <button className="btn-primary" style={{ width: 'auto', padding: '.55rem 1.25rem', flexShrink: 0 }} onClick={handleAdd} disabled={saving}>{saving ? '...' : '+ ADD'}</button>
            </div>
          </div>
          <div className="card">
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '.75rem' }}>
              <div className="card-title" style={{ margin: 0 }}>All Persons ({persons.length})</div>
              <button className="btn-sm" onClick={() => { setSelectMode(s => !s); setSelected(new Set()); }}>{selectMode ? 'CANCEL' : 'SELECT'}</button>
            </div>

            {selectMode && selected.size > 0 && (
              <div className="bulk-bar">
                <span className="bulk-bar-text">{selected.size} selected</span>
                <button className="btn-danger" onClick={deleteSelected} disabled={deleting}>{deleting ? 'DELETING...' : 'DELETE SELECTED'}</button>
                <button className="btn-secondary" onClick={() => setSelected(new Set())}>CLEAR</button>
              </div>
            )}
            {selectMode && (
              <div style={{ marginBottom: '.5rem' }}>
                <button className="btn-sm" onClick={selectAll}>{selected.size === persons.length ? 'DESELECT ALL' : 'SELECT ALL'}</button>
              </div>
            )}

            {persons.length === 0 ? <div className="empty">No persons yet.</div> : (
              <div className="table-wrap">
                <table>
                  <thead><tr>
                    {selectMode && <th><input type="checkbox" checked={selected.size === persons.length && persons.length > 0} onChange={selectAll} /></th>}
                    <th>Person</th>
                    <th>Color</th>
                    <th style={{ textAlign: 'right' }}>Actions</th>
                  </tr></thead>
                  <tbody>
                    {persons.map(p => (
                      <tr key={p.id} className="clickable" style={selected.has(p.id) ? { background: '#fffde7' } : {}} onClick={() => selectMode ? toggleSelect(p.id) : setEditPerson(p)}>
                        {selectMode && <td onClick={e => e.stopPropagation()}><input type="checkbox" checked={selected.has(p.id)} onChange={() => toggleSelect(p.id)} /></td>}
                        <td>
                          <span className="tag" style={{ background: personColor(p.name, personColors), color: '#1a1a1a' }}>{p.name}</span>
                        </td>
                        <td onClick={e => e.stopPropagation()}>
                          <ColorPicker
                            name={p.name}
                            color={personColor(p.name, personColors)}
                            onChange={onColorChange}
                          />
                        </td>
                        <td style={{ textAlign: 'right' }}>
                          <button className="btn-sm" onClick={e => { e.stopPropagation(); setEditPerson(p); }}>EDIT</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
          {editPerson && <EditPersonModal person={editPerson} onSave={onUpdate} onDelete={onDelete} onClose={() => setEditPerson(null)} />}
        </div>
      );
    }
    // ── CORPORATE ACTIONS WIZARD ──────────────────────────────
    function CorporateActionsTab({ transactions, onBulkAdd, personColors, assetTypes }) {
      const [step, setStep] = useState(1);
      const [person, setPerson] = useState('');
      const [stock, setStock] = useState('');
      const [action, setAction] = useState(null);
      const [date, setDate] = useState(todayISO());
      const [params, setParams] = useState({});
      const [preview, setPreview] = useState([]);
      const [applying, setApplying] = useState(false);

      // Strict Filter: Only show assets tagged as "STOCK" (to exclude Mutual Funds, Gold, etc.)
      const assetTypeMap = useMemo(() => {
        const map = {};
        transactions.forEach(t => { if (t.stock) map[t.stock] = t.assetType || 'STOCK'; });
        return map;
      }, [transactions]);

      const allStocks = [...new Set(transactions.map(t => t.stock))].filter(s => assetTypeMap[s] === 'STOCK').sort();
      const allPersons = [...new Set(transactions.map(t => t.person))].sort();

      const getHoldings = (p, s, d) => {
        const { holdings } = computeFIFO(transactions.filter(t => t.date <= d));
        const key = `${p}|${s}`;
        return (holdings[key] || []).reduce((sum, l) => sum + l.qty, 0);
      };

      const getAvgCost = (p, s, d) => {
        const { holdings } = computeFIFO(transactions.filter(t => t.date <= d));
        const key = `${p}|${s}`;
        const lots = holdings[key] || [];
        if (lots.length === 0) return 0;
        const totalQty = lots.reduce((sum, l) => sum + l.qty, 0);
        const totalInv = lots.reduce((sum, l) => sum + (l.qty * l.price), 0);
        return totalInv / totalQty;
      };

      const handlePreview = () => {
        // Use all transactions to find current stockholders, ignoring the action date for the basis
        const { holdings } = computeFIFO(transactions);
        const stockHolders = holdings[stock] || {};

        const personsToProcess = ['buyback', 'rights'].includes(action)
          ? [person]
          : Object.keys(stockHolders);

        if (personsToProcess.length === 0 && !['buyback', 'rights'].includes(action)) {
          alert('No holders found for this stock on the selected date.');
          return;
        }

        const txs = [];
        personsToProcess.forEach(p => {
          if (!p) return;
          const lots = stockHolders[p] || [];
          const currentQty = lots.reduce((sum, l) => sum + l.qty, 0);
          const totalInv = lots.reduce((sum, l) => sum + (l.qty * l.price), 0);
          const avgCost = currentQty > 0 ? totalInv / currentQty : 0;

          if (currentQty <= 0 && !['buyback', 'rights'].includes(action)) return;

          if (action === 'bonus') {
            const ratio = parseFloat(params.ratio) || 1;
            const bonusQty = Math.floor(currentQty * ratio);
            txs.push({ person: p, stock, date, qty: bonusQty, price: 0, note: `Bonus ${params.ratio}:1`, assetType: 'STOCK' });
          } else if (action === 'split') {
            const newRatio = parseFloat(params.newRatio) || 10;
            const oldRatio = parseFloat(params.oldRatio) || 1;
            const newQty = Math.floor(currentQty * (newRatio / oldRatio));
            const newPrice = (avgCost * oldRatio) / newRatio;
            txs.push({ person: p, stock, date, qty: -currentQty, price: avgCost, note: `Split Part 1: Wipe Old`, assetType: 'STOCK' });
            txs.push({ person: p, stock, date, qty: newQty, price: newPrice, note: `Split Part 2: New Qty @ ${newPrice.toFixed(2)}`, assetType: 'STOCK' });
          } else if (action === 'merger') {
            const newRatio = parseFloat(params.ratio) || 1;
            const newStock = (params.newStock || '').toUpperCase().trim();
            const newQty = Math.floor(currentQty * newRatio);
            txs.push({ person: p, stock, date, qty: -currentQty, price: avgCost, note: `Merger: Exit ${stock}`, assetType: 'STOCK' });
            txs.push({ person: p, stock: newStock, date, qty: newQty, price: (avgCost / newRatio), note: `Merger: Entry ${newStock}`, assetType: 'STOCK' });
          } else if (action === 'demerger') {
            const newStock = (params.newStock || '').toUpperCase().trim();
            const costAllocPct = parseFloat(params.costAlloc) || 5;
            const swapRatio = parseFloat(params.ratio) || 1;
            const totalInvestment = currentQty * avgCost;
            const transferValue = totalInvestment * (costAllocPct / 100);
            const remainingValue = totalInvestment - transferValue;
            const newQtyB = Math.floor(currentQty * swapRatio);
            const newPriceA = remainingValue / currentQty;
            const newPriceB = transferValue / newQtyB;
            txs.push({ person: p, stock, date, qty: -currentQty, price: avgCost, note: `Demerger: Cost Adjustment for ${stock}`, assetType: 'STOCK' });
            txs.push({ person: p, stock, date, qty: currentQty, price: newPriceA, note: `Demerger: Remaining Cost (${(100 - costAllocPct).toFixed(1)}%)`, assetType: 'STOCK' });
            txs.push({ person: p, stock: newStock, date, qty: newQtyB, price: newPriceB, note: `Demerger: Spun-off ${newStock} (${costAllocPct}%)`, assetType: 'STOCK' });
          } else if (action === 'delist') {
            txs.push({ person: p, stock, date, qty: -currentQty, price: 0, note: 'Delisting: Written off', assetType: 'STOCK' });
          } else if (action === 'buyback') {
            const bbQty = parseInt(params.qty) || 0;
            const bbPrice = parseFloat(params.price) || 0;
            txs.push({ person: p, stock, date, qty: -bbQty, price: bbPrice, note: 'Buyback', assetType: 'STOCK' });
          } else if (action === 'rights') {
            const rQty = parseInt(params.qty) || 0;
            const rPrice = parseFloat(params.price) || 0;
            txs.push({ person: p, stock, date, qty: rQty, price: rPrice, note: 'Rights Issue', assetType: 'STOCK' });
          }
        });

        setPreview(txs);
        setStep(3);
      };

      const handleApply = async () => {
        setApplying(true);
        try {
          await onBulkAdd(preview);
          alert('Corporate Action Applied Successfully!');
          setStep(1); setAction(null); setPerson(''); setStock(''); setParams({}); setPreview([]);
        } catch (e) { alert('Error: ' + e.message); }
        setApplying(false);
      };

      return (
        <div className="page">
          <div className="page-header">
            <div className="page-title">Corporate Actions</div>
            <div className="page-sub">Automated actions for Stocks & Assets</div>
          </div>

          <div style={{ display: 'flex', gap: '0.75rem', marginBottom: '2rem' }}>
            {[1, 2, 3].map(s => (
              <div key={s} style={{
                flex: 1,
                height: '6px',
                background: step >= s ? 'var(--sidebar-active-bg)' : '#e0e0e0',
                border: '1px solid var(--border)',
                boxShadow: step >= s ? '1px 1px 0px 0px #000' : 'none'
              }} />
            ))}
          </div>

          <div className="card" style={{ maxWidth: 850, padding: '1.5rem' }}>
            <div style={{ marginBottom: '1rem', display: 'flex', alignItems: 'center', gap: '8px' }}>
              <span style={{ background: '#000', color: '#fff', padding: '2px 8px', fontSize: 13, fontWeight: 700, fontFamily: 'var(--font-main)' }}>STEP {step}</span>
              <span style={{ fontStyle: 'italic', fontSize: 13, color: 'var(--text-muted)' }}>
                {step === 1 ? 'Identify the source asset' : step === 2 ? 'Choose the adjustment type' : 'Confirm ledger entries'}
              </span>
            </div>
            {step === 1 && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '1.5rem' }}>
                <div className="form-row">
                  <div className="form-group" style={{ flex: 2 }}>
                    <label className="form-label">Select Stock</label>
                    <select className="form-input" value={stock} onChange={e => setStock(e.target.value)}>
                      <option value="">Select Stock...</option>
                      {allStocks.map(s => <option key={s} value={s}>{s}</option>)}
                    </select>
                  </div>
                  <div className="form-group" style={{ flex: 1 }}>
                    <label className="form-label">Action Date</label>
                    <input type="date" className="form-input" value={date} onChange={e => setDate(e.target.value)} />
                  </div>
                </div>
                <button className="btn-primary" disabled={!stock} onClick={() => setStep(2)}>NEXT: SELECT ACTION</button>
              </div>
            )}

            {step === 2 && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '1.5rem', fontFamily: 'var(--font-main)' }}>
                <div style={{ fontSize: 13, color: 'var(--text-muted)' }}>
                  Record Action for <strong>{stock}</strong>
                </div>
                <div className="action-grid">
                  {[
                    { id: 'bonus', label: 'Bonus', sub: 'Apply free shares', cls: 'bonus' },
                    { id: 'split', label: 'Split', sub: 'Adjust face value', cls: 'split' },
                    { id: 'merger', label: 'Merger', sub: 'Switch to new ticker', cls: 'merger' },
                    { id: 'demerger', label: 'Demerger', sub: 'Spin-off new entity', cls: 'demerger' },
                    { id: 'buyback', label: 'Buyback', sub: 'Tender shares', cls: 'buyback' },
                    { id: 'rights', label: 'Rights', sub: 'Purchase offer', cls: 'rights' },
                    { id: 'delist', label: 'Delist', sub: 'Write off holding', cls: 'delist' }
                  ].map(a => (
                    <div key={a.id} className={`action-block ${a.cls} ${action === a.id ? 'active' : ''}`}
                      onClick={() => setAction(a.id)}>
                      <div className="label">{a.label}</div>
                      <div className="sub">{a.sub}</div>
                    </div>
                  ))}
                </div>

                <div style={{ background: '#F8F9FA', padding: '1rem', border: '3px solid var(--border)', boxShadow: 'var(--elevation-2)', marginTop: '0.75rem' }}>
                  <div className="card-title" style={{ color: '#000', marginBottom: '0.75rem', fontSize: 13 }}>Parameters for {action?.toUpperCase()}</div>
                  {['buyback', 'rights'].includes(action) && (
                    <div className="form-group" style={{ marginBottom: '1rem' }}>
                      <label className="form-label">Participating Person</label>
                      <select className="form-input" value={person} onChange={e => setPerson(e.target.value)}>
                        <option value="">Select Person...</option>
                        {allPersons.map(p => <option key={p} value={p}>{p}</option>)}
                      </select>
                    </div>
                  )}

                  {action === 'bonus' && (
                    <div className="form-group">
                      <label className="form-label">Bonus Ratio (e.g. 1 if 1:1)</label>
                      <input type="number" className="form-input" placeholder="Shares received per 1 held" onChange={e => setParams({ ...params, ratio: e.target.value })} />
                    </div>
                  )}
                  {action === 'split' && (
                    <div className="form-row">
                      <div className="form-group"><label className="form-label">New Face Value Qty</label><input type="number" className="form-input" placeholder="e.g. 10" onChange={e => setParams({ ...params, newRatio: e.target.value })} /></div>
                      <div className="form-group"><label className="form-label">Old Face Value Qty</label><input type="number" className="form-input" placeholder="e.g. 1" onChange={e => setParams({ ...params, oldRatio: e.target.value })} /></div>
                    </div>
                  )}
                  {action === 'merger' && (
                    <div className="form-row">
                      <div className="form-group"><label className="form-label">Receiver Stock Ticker</label><input type="text" className="form-input" placeholder="e.g. HDFCBANK" onChange={e => setParams({ ...params, newStock: e.target.value })} /></div>
                      <div className="form-group"><label className="form-label">Swap Ratio (New:Old)</label><input type="number" className="form-input" placeholder="e.g. 1.68" onChange={e => setParams({ ...params, ratio: e.target.value })} /></div>
                    </div>
                  )}
                  {action === 'demerger' && (
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem' }}>
                      <div className="form-row">
                        <div className="form-group"><label className="form-label">New Entity Ticker</label><input type="text" className="form-input" placeholder="e.g. JIOFIN" onChange={e => setParams({ ...params, newStock: e.target.value })} /></div>
                        <div className="form-group"><label className="form-label">Cost Allocation to New Entity (%)</label><input type="number" className="form-input" placeholder="e.g. 6.42" onChange={e => setParams({ ...params, costAlloc: e.target.value })} /></div>
                      </div>
                      <div className="form-group"><label className="form-label">Share Swap Ratio (New for every 1 Old)</label><input type="number" className="form-input" placeholder="e.g. 1" onChange={e => setParams({ ...params, ratio: e.target.value })} /></div>
                    </div>
                  )}
                  {(action === 'buyback' || action === 'rights') && (
                    <div className="form-row">
                      <div className="form-group"><label className="form-label">Quantity</label><input type="number" className="form-input" onChange={e => setParams({ ...params, qty: e.target.value })} /></div>
                      <div className="form-group"><label className="form-label">Execution Price ₹</label><input type="number" className="form-input" onChange={e => setParams({ ...params, price: e.target.value })} /></div>
                    </div>
                  )}
                  {action === 'delist' && <div style={{ fontSize: 13, color: 'var(--red)' }}>This will write off all active holdings for this stock across all persons at ₹0 price.</div>}
                  {!action && <div style={{ fontSize: 13, color: 'var(--text-muted)', textAlign: 'center', padding: '1rem' }}>Please select an action from the tiles above</div>}
                </div>

                <div style={{ display: 'flex', gap: '10px' }}>
                  <button className="btn-secondary" style={{ flex: 1 }} onClick={() => { setStep(1); setAction(null); }}>BACK</button>
                  <button className="btn-primary" style={{ flex: 2 }} disabled={!action || (['buyback', 'rights'].includes(action) && !person)} onClick={handlePreview}>PREVIEW ADJUSTMENT</button>
                </div>
              </div>
            )}

            {step === 3 && (
              <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
                <div className="card-title" style={{ fontSize: 18, color: '#000' }}>Review Ledger Adjustments</div>
                <div style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: '1.5rem' }}>The following entries will be recorded on {fmtDate(date)}:</div>
                <div className="table-wrap" style={{ boxShadow: 'var(--elevation-3)' }}>
                  <table>
                    <thead><tr><th>Person</th><th>Stock</th><th>Qty</th><th>Price</th><th>Note</th></tr></thead>
                    <tbody>
                      {preview.map((p, i) => (
                        <tr key={i}>
                          <td><span className="tag" style={{ background: personColor(p.person, personColors), color: '#1a1a1a' }}>{p.person}</span></td>
                          <td>{p.stock}</td>
                          <td className={p.qty > 0 ? 'pos' : 'neg'}>{p.qty}</td>
                          <td>{fmt(p.price)}</td>
                          <td style={{ fontSize: 10 }}>{p.note}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <div style={{ display: 'flex', gap: '10px', marginTop: '1rem' }}>
                  <button className="btn-secondary" style={{ flex: 1 }} onClick={() => setStep(2)}>BACK</button>
                  <button className="btn-primary" style={{ flex: 2 }} onClick={handleApply} disabled={applying}>
                    {applying ? 'APPLYING...' : 'APPLY TO LEDGER'}
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── MAIN APP ──────────────────────────────────────────────
    function App() {
      const [user, setUser] = useState(undefined);
      const uid = user?.uid;
      const [tab, setTab] = useState('dashboard');
      const [transactions, setTransactions] = useState([]);
      const [persons, setPersons] = useState([]);
      const [assetTypes, setAssetTypes] = useState([]);
      const [stockPrices, setStockPrices] = useState({});
      const [personColors, setPersonColors] = useState({});
      const [assetTypeColors, setAssetTypeColors] = useState({});
      const [sidebarOpen, setSidebarOpen] = useState(false);
      const [visibleTabs, setVisibleTabs] = useState({}); // { dashboard: true, transactions: true, ... }
      const [showNavSettings, setShowNavSettings] = useState(false);
      const [loading, setLoading] = useState(true);
      const [portfolioFilter, setPortfolioFilter] = useState({ persons: ['All'], stocks: ['All'], assetTypes: ['All'] });
      const [dashboardDefaults, setDashboardDefaults] = useState({ persons: ['All'], assetTypes: ['All'] });
      const [dashboardFilters, setDashboardFilters] = useState({ persons: null, assetTypes: null });
      const [transactionsFilters, setTransactionsFilters] = useState({ persons: ['All'], stocks: ['All'], types: ['All'], search: '' });
      const [fifoFilters, setFifoFilters] = useState({ persons: ['All'], types: ['All'], search: '' });
      const [showDashboardSettings, setShowDashboardSettings] = useState(false);
      const [priceMeta, setPriceMeta] = useState({ lastUpdated: null });

      const touchStartX = useRef(null);
      const touchStartY = useRef(null);
      const ignoreSwipe = useRef(false);

      const navItems = [
        { key: 'dashboard', label: 'Dashboard', icon: '▦' },
        { key: 'transactions', label: 'Transactions', icon: '↕' },
        { key: 'portfolio', label: 'Portfolio', icon: '◈' },
        { key: 'fifo', label: 'FIFO Results', icon: '⟳' },
        { key: 'manage', label: 'Manage', icon: '⚙' },
        { key: 'actions', label: 'Corporate Actions', icon: 'ϟ' },
      ];

      useEffect(() => {
        const onTS = e => {
          touchStartX.current = e.touches[0].clientX;
          touchStartY.current = e.touches[0].clientY;
          // Check if touch started inside a table or table-wrap
          ignoreSwipe.current = !!e.target.closest('.table-wrap');
        };
        const onTE = e => {
          if (touchStartX.current === null || ignoreSwipe.current) {
            touchStartX.current = null;
            return;
          }
          const dx = e.changedTouches[0].clientX - touchStartX.current;
          const dy = Math.abs(e.changedTouches[0].clientY - touchStartY.current);
          if (Math.abs(dx) < dy * 0.7) { touchStartX.current = null; return; }
          if (dx > 60 && touchStartX.current < 40) { setSidebarOpen(true); }
          else if (dx < -60 && sidebarOpen) { setSidebarOpen(false); }
          else if (dx < -60 && !sidebarOpen) {
            setTab(prev => {
              const idx = navItems.findIndex(n => n.key === prev);
              return idx < navItems.length - 1 ? navItems[idx + 1].key : prev;
            });
          } else if (dx > 60 && touchStartX.current >= 40 && !sidebarOpen) {
            setTab(prev => {
              const idx = navItems.findIndex(n => n.key === prev);
              return idx > 0 ? navItems[idx - 1].key : prev;
            });
          }
          touchStartX.current = null;
        };
        document.addEventListener('touchstart', onTS);
        document.addEventListener('touchend', onTE);
        return () => { document.removeEventListener('touchstart', onTS); document.removeEventListener('touchend', onTE); };
      }, [sidebarOpen]);

      useEffect(() => { return auth.onAuthStateChanged(u => setUser(u || null)); }, []);

      useEffect(() => {
        if (!user) { setLoading(false); return; }
        const uid = user.uid; setLoading(true);
        const t1 = db.collection(`users/${uid}/inv_transactions`).onSnapshot(snap => { setTransactions(snap.docs.map(d => ({ id: d.id, ...d.data() }))); setLoading(false); }, () => setLoading(false));
        const t2 = db.collection(`users/${uid}/inv_persons`).onSnapshot(snap => { setPersons(snap.docs.map(d => ({ id: d.id, ...d.data() }))); }, () => { });
        const t2_1 = db.collection(`users/${uid}/inv_assetTypes`).onSnapshot(snap => { setAssetTypes(snap.docs.map(d => ({ id: d.id, ...d.data() }))); }, () => { });
        const t3 = db.collection(`users/${uid}/inv_meta`).doc('inv_stockPrices').onSnapshot(snap => {
          if (snap.exists) {
            setStockPrices(snap.data().prices || {});
            setPriceMeta({ lastUpdated: snap.data().lastUpdated || null });
          }
        }, () => { });
        const t4 = db.collection(`users/${uid}/inv_meta`).doc('inv_personColors').onSnapshot(snap => { if (snap.exists) setPersonColors(snap.data().colors || {}); }, () => { });
        const t4_1 = db.collection(`users/${uid}/inv_meta`).doc('inv_assetTypeColors').onSnapshot(snap => { if (snap.exists) setAssetTypeColors(snap.data().colors || {}); }, () => { });
        const t5 = db.collection(`users/${uid}/inv_meta`).doc('inv_uiSettings').onSnapshot(snap => {
          if (snap.exists) {
            const data = snap.data();
            setVisibleTabs(data.visibleTabs || {});
            if (data.dashboardDefaults) {
              setDashboardDefaults(data.dashboardDefaults);
              // Only auto-apply defaults on first load if current filter is still 'All'
              setPortfolioFilter(prev => {
                if (prev.persons.length === 1 && prev.persons[0] === 'All' && prev.assetTypes.length === 1 && prev.assetTypes[0] === 'All') {
                  return { ...prev, ...data.dashboardDefaults };
                }
                return prev;
              });
            }
          }
        }, () => { });
        return () => { t1(); t2(); t2_1(); t3(); t4(); t4_1(); t5(); };
      }, [user]);

      // INITIALIZE DEFAULTS & MIGRATION
      useEffect(() => {
        if (!uid || loading) return;
        const init = async () => {
          try {
            // Initialize Default Asset Types
            const existingTypes = await db.collection(`users/${uid}/inv_assetTypes`).get();
            if (existingTypes.empty) {
              const defaults = ['STOCK', 'MUTUAL FUND', 'ETF', 'BONDS', 'GOLD', 'REAL ESTATE'];
              const batch = db.batch();
              defaults.forEach(t => batch.set(db.collection(`users/${uid}/inv_assetTypes`).doc(), { name: t }));
              await batch.commit();
            }

            // Data Migration: Mark existing transactions as STOCK
            const txSnap = await db.collection(`users/${uid}/inv_transactions`).get();
            const batchTx = db.batch();
            let count = 0;
            txSnap.docs.forEach(doc => {
              if (!doc.data().assetType) {
                batchTx.update(doc.ref, { assetType: 'STOCK' });
                count++;
                if (count >= 450) { /* Limit to avoid 500 batch limit issues */ }
              }
            });
            if (count > 0) await batchTx.commit();
          } catch (e) { console.error("Init error:", e); }
        };
        init();
      }, [uid, loading]);



      const addTx = async tx => { await db.collection(`users/${uid}/inv_transactions`).add({ ...tx, createdAt: new Date().toISOString() }); };
      const bulkAddTx = async (txs) => {
        const batchSize = 500;
        for (let i = 0; i < txs.length; i += batchSize) {
          const batch = db.batch();
          txs.slice(i, i + batchSize).forEach(tx => { const ref = db.collection(`users/${uid}/inv_transactions`).doc(); batch.set(ref, { ...tx, createdAt: new Date().toISOString() }); });
          await batch.commit();
        }
      };
      const updateTx = async (id, data) => { await db.collection(`users/${uid}/inv_transactions`).doc(id).update(data); };
      const deleteTx = async id => { await db.collection(`users/${uid}/inv_transactions`).doc(id).delete(); };

      const ensurePerson = useCallback(async (personName) => {
        const upper = personName.toUpperCase().trim(); if (!upper) return;
        const already = persons.find(p => p.name.toUpperCase() === upper); if (already) return;
        const snap = await db.collection(`users/${uid}/inv_persons`).where('name', '==', upper).get();
        if (snap.empty) await db.collection(`users/${uid}/inv_persons`).add({ name: upper });
      }, [persons, uid]);

      const addPerson = async p => { await db.collection(`users/${uid}/inv_persons`).add(p); };
      const updatePerson = async (id, data, oldName) => {
        const newName = data.name.toUpperCase().trim();
        await db.collection(`users/${uid}/inv_persons`).doc(id).update(data);
        if (oldName && oldName.toUpperCase() !== newName) {
          const snap = await db.collection(`users/${uid}/inv_transactions`).where('person', '==', oldName.toUpperCase()).get();
          if (!snap.empty) { const batch = db.batch(); snap.docs.forEach(doc => batch.update(doc.ref, { person: newName })); await batch.commit(); }
        }
      };
      const deletePerson = async id => { await db.collection(`users/${uid}/inv_persons`).doc(id).delete(); };

      const updatePrices = async (updates, replace = false) => {
        const merged = replace ? updates : { ...stockPrices, ...updates };
        await db.collection(`users/${uid}/inv_meta`).doc('inv_stockPrices').set({ prices: merged, lastUpdated: new Date().toISOString() });
      };
      const deletePrice = async (stock) => {
        const updated = { ...stockPrices }; delete updated[stock];
        await db.collection(`users/${uid}/inv_meta`).doc('inv_stockPrices').set({ prices: updated, lastUpdated: new Date().toISOString() });
      };

      const updateDashboardDefaults = async (defaults) => {
        setDashboardDefaults(defaults);
        if (uid) {
          await db.collection(`users/${uid}/inv_meta`).doc('inv_uiSettings').set({ dashboardDefaults: defaults }, { merge: true });
        }
      };

      const updatePersonColor = async (personName, color) => {
        const upper = personName.toUpperCase().trim();
        const updated = { ...personColors, [upper]: color };
        await db.collection(`users/${uid}/inv_meta`).doc('inv_personColors').set({ colors: updated });
      };

      const updateAssetTypeColor = async (typeName, color) => {
        const upper = typeName.toUpperCase().trim();
        const updated = { ...assetTypeColors, [upper]: color };
        await db.collection(`users/${uid}/inv_meta`).doc('inv_assetTypeColors').set({ colors: updated });
      };

      const addAssetType = async t => {
        const ref = await db.collection(`users/${uid}/inv_assetTypes`).add(t);
        // Optimistic UI update so it appears instantly
        setAssetTypes(prev => {
          const exists = prev.some(x => x.id === ref.id);
          if (exists) return prev;
          return [...prev, { id: ref.id, ...t }];
        });
      };
      const updateAssetType = async (id, data, oldName) => {
        const newName = data.name.toUpperCase().trim();
        await db.collection(`users/${uid}/inv_assetTypes`).doc(id).update(data);
        if (oldName && oldName.toUpperCase() !== newName) {
          const snap = await db.collection(`users/${uid}/inv_transactions`).where('assetType', '==', oldName.toUpperCase()).get();
          if (!snap.empty) { const batch = db.batch(); snap.docs.forEach(doc => batch.update(doc.ref, { assetType: newName })); await batch.commit(); }
        }
      };
      const deleteAssetType = async id => { await db.collection(`users/${uid}/inv_assetTypes`).doc(id).delete(); };

      const updateTabVisibility = async (key, isVisible) => {
        const updated = { ...visibleTabs, [key]: isVisible };
        setVisibleTabs(updated);
        if (uid) {
          await db.collection(`users/${uid}/inv_meta`).doc('inv_uiSettings').set({ visibleTabs: updated }, { merge: true });
        }
      };

      if (user === undefined) return <div className="spinner">Loading...</div>;
      if (!user) return <AuthPage />;

      const personList = persons.length > 0 ? persons : [...new Set(transactions.filter(t => t.person).map(t => t.person))].map(n => ({ id: n, name: n }));

      const goTo = k => { setTab(k); setSidebarOpen(false); };
      const handlePersonDrilldown = p => { setPortfolioFilter({ persons: [p], stocks: ['All'] }); setTab('portfolio'); };

      return (
        <div className="app">
          {showNavSettings && (
            <div className="modal-overlay" onClick={() => setShowNavSettings(false)}>
              <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: '380px' }}>
                <div className="modal-title">
                  <span>Manage Sidebar Tabs</span>
                  <button className="modal-close" onClick={() => setShowNavSettings(false)}>×</button>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: '12px', padding: '15px 5px' }}>
                  {navItems.map(item => (
                    <label key={item.key} style={{ display: 'flex', alignItems: 'center', gap: '12px', cursor: 'pointer', fontSize: 13 }}>
                      <input
                        type="checkbox"
                        checked={visibleTabs[item.key] !== false}
                        onChange={e => updateTabVisibility(item.key, e.target.checked)}
                      />
                      <span>{item.icon} {item.label}</span>
                    </label>
                  ))}
                </div>
                <div className="modal-actions">
                  <button className="btn-primary" onClick={() => setShowNavSettings(false)}>DONE</button>
                </div>
              </div>
            </div>
          )}

          {showDashboardSettings && (
            <div className="modal-overlay" onClick={() => setShowDashboardSettings(false)}>
              <div className="modal" onClick={e => e.stopPropagation()} style={{ maxWidth: '450px' }}>
                <div className="modal-title">
                  <span>Dashboard Defaults</span>
                  <button className="modal-close" onClick={() => setShowDashboardSettings(false)}>×</button>
                </div>
                <div style={{ fontSize: 13, color: 'var(--text-muted)', marginBottom: '1.5rem' }}>
                  Choose which filters should be active by default every time you open the dashboard.
                </div>

                <div className="form-group" style={{ marginBottom: '1.5rem' }}>
                  <label className="form-label">Default Persons</label>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.4rem', marginTop: '0.5rem' }}>
                    <div
                      className={`filter-chip all ${dashboardDefaults.persons.includes('All') ? 'active' : 'inactive'}`}
                      onClick={() => {
                        updateDashboardDefaults({ ...dashboardDefaults, persons: ['All'] });
                      }}
                    >All</div>
                    {persons.sort((a, b) => a.name.localeCompare(b.name)).map(p => {
                      const isActive = dashboardDefaults.persons.includes(p.name);
                      return (
                        <div
                          key={p.name}
                          className={`filter-chip ${isActive ? 'active' : ''}`}
                          onClick={() => {
                            let next = dashboardDefaults.persons.filter(x => x !== 'All');
                            if (next.includes(p.name)) next = next.filter(x => x !== p.name);
                            else next.push(p.name);
                            if (next.length === 0) next = ['All'];
                            updateDashboardDefaults({ ...dashboardDefaults, persons: next });
                          }}
                        >{p.name}</div>
                      );
                    })}
                  </div>
                </div>

                <div className="form-group" style={{ marginBottom: '1.5rem' }}>
                  <label className="form-label">Default Asset Types</label>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.4rem', marginTop: '0.5rem' }}>
                    <div
                      className={`filter-chip all ${dashboardDefaults.assetTypes.includes('All') ? 'active' : 'inactive'}`}
                      onClick={() => {
                        updateDashboardDefaults({ ...dashboardDefaults, assetTypes: ['All'] });
                      }}
                    >All</div>
                    {assetTypes.sort((a, b) => a.name.localeCompare(b.name)).map(t => {
                      const isActive = dashboardDefaults.assetTypes.includes(t.name);
                      return (
                        <div
                          key={t.name}
                          className={`filter-chip ${isActive ? 'active' : ''}`}
                          onClick={() => {
                            let next = dashboardDefaults.assetTypes.filter(x => x !== 'All');
                            if (next.includes(t.name)) next = next.filter(x => x !== t.name);
                            else next.push(t.name);
                            if (next.length === 0) next = ['All'];
                            updateDashboardDefaults({ ...dashboardDefaults, assetTypes: next });
                          }}
                        >{t.name}</div>
                      );
                    })}
                  </div>
                </div>

                <div className="modal-actions" style={{ marginTop: '2rem' }}>
                  <button className="btn-primary" style={{ width: '100%' }} onClick={() => setShowDashboardSettings(false)}>SAVE PREFERENCES</button>
                </div>
              </div>
            </div>
          )}

          <button className={`menu-toggle ${sidebarOpen ? 'sidebar-is-open' : ''}`} onClick={() => setSidebarOpen(o => !o)}>☰</button>
          <div className={`sidebar-overlay${sidebarOpen ? ' open' : ''}`} onClick={() => setSidebarOpen(false)} />
          <aside className={`sidebar ${sidebarOpen ? 'open' : ''}`}>
            <div className="sidebar-brand" style={{ padding: '2rem 1.5rem' }}>
              <div className="sidebar-brand-name">Tracker.in</div>
            </div>

            <nav className="sidebar-nav">
              {navItems.filter(n => {
                // By default, Portfolio and Actions are hidden
                if ((n.key === 'portfolio' || n.key === 'actions') && visibleTabs[n.key] === undefined) return false;
                return visibleTabs[n.key] !== false;
              }).map(item => (
                <button
                  key={item.key}
                  className={`sidebar-item ${tab === item.key ? 'active' : ''}`}
                  onClick={() => goTo(item.key)}
                >
                  <span className="sidebar-icon">{item.icon}</span>
                  <span className="nav-label">{item.label}</span>
                </button>
              ))}
            </nav>
            <div className="sidebar-footer">
              <div className="sidebar-user-info">
                <div className="sidebar-user-avatar">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </div>
                <div className="sidebar-user-details">
                  <div className="sidebar-user-email">{user.email}</div>
                  <div className="sidebar-user-role">Premium Member</div>
                </div>
                <button onClick={() => setShowNavSettings(true)} style={{ background: 'none', border: 'none', color: 'var(--text-muted)', cursor: 'pointer', padding: '5px', marginLeft: 'auto' }} title="Sidebar Settings">⚙️</button>
              </div>
              <button className="btn-logout" onClick={() => auth.signOut()}>Logout</button>
            </div>
          </aside>
          <main className="main">
            {loading ? <div className="spinner">Loading data...</div> : (
              <>
                {tab === 'dashboard' && <DashboardTab transactions={transactions} stockPrices={stockPrices} personColors={personColors} assetTypes={assetTypes} assetTypeColors={assetTypeColors} onPersonClick={handlePersonDrilldown} dashboardDefaults={dashboardDefaults} onShowSettings={() => setShowDashboardSettings(true)} filters={dashboardFilters} onFilterChange={setDashboardFilters} />}
                {tab === 'transactions' && <TransactionsTab transactions={transactions} persons={personList} assetTypes={assetTypes} onAdd={addTx} onBulkAdd={bulkAddTx} onUpdate={updateTx} onDelete={deleteTx} onEnsurePerson={ensurePerson} personColors={personColors} assetTypeColors={assetTypeColors} filters={transactionsFilters} onFilterChange={setTransactionsFilters} />}
                {tab === 'portfolio' && <PortfolioTab transactions={transactions} stockPrices={stockPrices} personColors={personColors} assetTypes={assetTypes} assetTypeColors={assetTypeColors} filter={portfolioFilter} onFilterChange={setPortfolioFilter} />}
                {tab === 'fifo' && <FIFOTab transactions={transactions} personColors={personColors} assetTypes={assetTypes} assetTypeColors={assetTypeColors} filters={fifoFilters} onFilterChange={setFifoFilters} />}
                {tab === 'manage' && (
                  <ManageTab
                    persons={personList} onAddPerson={addPerson} onUpdatePerson={updatePerson} onDeletePerson={deletePerson}
                    personColors={personColors} onColorChange={updatePersonColor}
                    assetTypes={assetTypes} onAddAssetType={addAssetType} onUpdateAssetType={updateAssetType} onDeleteAssetType={deleteAssetType}
                    assetTypeColors={assetTypeColors} onAssetTypeColorChange={updateAssetTypeColor}
                    stockPrices={stockPrices} onUpdatePrices={updatePrices} onDeletePrice={deletePrice} uid={uid} priceMeta={priceMeta}
                    transactions={transactions}
                  />
                )}
                {tab === 'actions' && <CorporateActionsTab transactions={transactions} onBulkAdd={bulkAddTx} personColors={personColors} assetTypes={assetTypes} />}
              </>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
